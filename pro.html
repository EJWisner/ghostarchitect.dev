<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Ghost Architect™ — Upgrade to Pro</title>

  <!-- Canonical: this is a thin redirect page. The real pricing lives at /pricing. -->
  <link rel="canonical" href="https://ghostarchitect.dev/pricing" />

  <!-- Meta refresh — kicks in if JS is disabled, gives users a clear path. -->
  <meta http-equiv="refresh" content="0; url=/pricing" />

  <!-- JS redirect — fires immediately on modern browsers, faster than meta refresh. -->
  <script>
    // Preserve any query string or hash the user arrived with (e.g. UTM params from
    // future marketing). Keeps analytics chains intact.
    var dest = '/pricing' + (location.search || '') + (location.hash || '');
    location.replace(dest);
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap {
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem;
      color: #e5e7eb;
      font-weight: 600;
    }
    p {
      color: #9ca3af;
      margin: 0.5rem 0;
      font-size: 0.95rem;
    }
    a {
      color: #00d4aa;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Redirecting to plans &amp; pricing…</h1>
    <p>If you aren't redirected automatically, click below.</p>
    <p><a href="/pricing">Go to pricing →</a></p>
  </div>
</body>
</html>
