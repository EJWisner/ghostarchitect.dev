<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#0a1528">
  <title>Ghost Portal — ejwisner</title>
  <style>
    :root {
      --bg-page: #050a14;
      --bg-card: rgba(10, 21, 40, 0.94);
      --bg-card-top: rgba(18, 36, 64, 0.97);
      --bg-tile: rgba(15, 28, 50, 0.85);
      --bg-tile-hover: rgba(20, 38, 65, 0.95);
      --border: rgba(0, 191, 216, 0.28);
      --border-strong: rgba(0, 191, 216, 0.55);
      --cyan: #00bfd8;
      --cyan-bright: #00e5ff;
      --cyan-dim: #4d8a99;
      --navy: #0a2540;
      --text-primary: #f5f9ff;
      --text-secondary: #b8c5d6;
      --text-tertiary: #8a9aaf;
      --good: #00e5a8;
      --warn: #ffc266;
      --bad: #ff7a7a;
      --grid: rgba(0, 191, 216, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100%; background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
              env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 20px 18px 40px; }

    .card {
      background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none; opacity: 0.5;
    }

    .titlebar {
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border); background: rgba(8,14,26,0.4);
      position: relative; z-index: 2;
    }
    .brand { display: flex; align-items: center; gap: 12px; letter-spacing: 0.18em; font-size: 12px; font-weight: 700; }
    .brand-mark {
      width: 9px; height: 9px; border-radius: 2px; background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan); animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .brand-text {
      background: linear-gradient(90deg, var(--cyan-bright), var(--cyan));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .portal-tag { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; }

    .body { padding: 24px 22px 22px; position: relative; z-index: 1; }

    /* HERO */
    .hero { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid var(--border); gap: 16px; margin-bottom: 22px; }
    .hero-label { font-size: 11px; letter-spacing: 0.2em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    .hero-value { font-size: 56px; font-weight: 200; line-height: 1; color: var(--text-primary); }
    .hero-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
    .hero-right { text-align: right; }
    .hero-right .delta { font-size: 14px; color: var(--good); font-weight: 500; }
    .hero-right .delta-sub { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; margin-top: 2px; }

    /* LEVEL 0: TILE GRID */
    .section-label { font-size: 11px; letter-spacing: 0.2em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 14px; }
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
    .tile {
      background: var(--bg-tile);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .tile:hover {
      background: var(--bg-tile-hover);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .tile.empty {
      cursor: default; opacity: 0.5;
    }
    .tile.empty:hover {
      background: var(--bg-tile); border-color: var(--border); transform: none;
    }
    .tile-mode {
      font-size: 11px; letter-spacing: 0.16em; color: var(--cyan); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .tile-count { font-size: 38px; font-weight: 200; line-height: 1; }
    .tile-count-unit { font-size: 12px; color: var(--text-tertiary); margin-left: 4px; }
    .tile-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 12px; }
    .tile-arrow {
      position: absolute; top: 18px; right: 18px;
      color: var(--cyan-dim); font-size: 16px;
      transition: color 0.15s, transform 0.15s;
    }
    .tile:hover .tile-arrow { color: var(--cyan); transform: translate(2px, -2px); }

    .info-icon {
      position: absolute; top: 16px; left: 16px;
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(8, 14, 26, 0.6);
      color: var(--text-tertiary);
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: help;
      transition: all 0.15s;
      font-family: 'Times New Roman', serif;
      font-style: italic;
      line-height: 1;
    }
    .info-icon:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 191, 216, 0.1); }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(2, 6, 14, 0.78);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      max-width: 500px; width: 100%;
      padding: 26px 28px 22px;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: absolute; top: 12px; right: 14px;
      width: 28px; height: 28px;
      background: transparent; border: none;
      color: var(--text-tertiary); font-size: 20px;
      cursor: pointer; transition: color 0.15s;
      line-height: 1; padding: 0;
    }
    .modal-close:hover { color: var(--cyan); }
    .modal-mode {
      font-size: 11px; letter-spacing: 0.18em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .modal-title {
      font-size: 22px; font-weight: 300; color: var(--text-primary);
      margin-bottom: 14px; line-height: 1.2;
    }
    .modal-body {
      font-size: 14px; line-height: 1.65; color: var(--text-secondary);
    }

    /* LEVEL 1: MODE DASHBOARD */
    .back-bar {
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .export-btn { margin-left: auto; }
    .back-btn {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; font-size: 12px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.1em;
    }
    .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .breadcrumb { font-size: 12px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
    .breadcrumb b { color: var(--text-primary); font-weight: 500; }

    .mode-stats { display: flex; gap: 24px; margin-bottom: 22px; flex-wrap: wrap; }
    .mode-stat { padding-right: 24px; border-right: 1px solid var(--border); }
    .mode-stat:last-child { border-right: none; }
    .mode-stat .label { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; }
    .mode-stat .value { font-size: 24px; font-weight: 300; color: var(--text-primary); }

    .report-list { display: flex; flex-direction: column; gap: 10px; }
    .report-row {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative;
    }
    .report-row:hover { background: var(--bg-tile-hover); border-color: var(--border-strong); }
    .report-row-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .report-project { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .report-date { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.06em; white-space: nowrap; }
    .report-summary { font-size: 12px; line-height: 1.5; color: var(--text-secondary); }
    .report-meta { font-size: 10px; color: var(--text-tertiary); margin-top: 8px; letter-spacing: 0.04em; }

    /* Severity chip row */
    .severity-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .sev-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid;
    }
    .sev-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
    .sev-critical { color: #ff7a7a; border-color: rgba(255, 122, 122, 0.4); background: rgba(255, 122, 122, 0.06); }
    .sev-critical .dot { background: #ff5555; box-shadow: 0 0 6px #ff5555; }
    .sev-high { color: #ffa666; border-color: rgba(255, 166, 102, 0.4); background: rgba(255, 166, 102, 0.06); }
    .sev-high .dot { background: #ff9040; }
    .sev-medium { color: #ffc266; border-color: rgba(255, 194, 102, 0.4); background: rgba(255, 194, 102, 0.06); }
    .sev-medium .dot { background: #ffb030; }
    .sev-low { color: #79c4d4; border-color: rgba(121, 196, 212, 0.4); background: rgba(121, 196, 212, 0.06); }
    .sev-low .dot { background: #5aa8ba; }
    .sev-total {
      color: var(--text-tertiary); border-color: var(--border); background: transparent;
      margin-left: 4px;
    }
    .sev-total .dot { display: none; }

    /* History grouping */
    .history-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--cyan-dim); border: 1px solid var(--border);
      background: rgba(0, 191, 216, 0.04);
      margin-left: 8px;
    }

    /* LEVEL 2 — View tabs (Findings | Full Report) */
    .view-tabs {
      display: flex; gap: 2px; margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .view-tab {
      background: transparent; border: none;
      padding: 10px 18px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
      font-family: inherit; position: relative;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .view-tab:hover { color: var(--text-secondary); }
    .view-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .view-tab-count {
      display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 10px;
      background: rgba(0, 191, 216, 0.12); font-size: 10px; color: var(--cyan-bright);
    }

    /* LEVEL 2 — Findings list view */
    .findings-toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .findings-toolbar-label {
      font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase;
      margin-right: 4px;
    }
    .filter-chip {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 14px; padding: 5px 12px; font-size: 11px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .filter-chip:hover { border-color: var(--cyan-dim); color: var(--text-primary); }
    .filter-chip.active { background: rgba(0, 191, 216, 0.12); border-color: var(--cyan); color: var(--cyan); }
    .filter-chip.active.sev-critical-active { background: rgba(255, 122, 122, 0.12); border-color: #ff7a7a; color: #ff7a7a; }
    .filter-chip.active.sev-high-active     { background: rgba(255, 166, 102, 0.12); border-color: #ffa666; color: #ffa666; }
    .filter-chip.active.sev-medium-active   { background: rgba(255, 194, 102, 0.12); border-color: #ffc266; color: #ffc266; }
    .filter-chip.active.sev-low-active      { background: rgba(121, 196, 212, 0.12); border-color: #79c4d4; color: #79c4d4; }

    .totals-bar {
      display: flex; gap: 22px; padding: 14px 18px; margin-bottom: 16px;
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      flex-wrap: wrap;
    }
    .totals-stat .lbl { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; }
    .totals-stat .val { font-size: 20px; font-weight: 300; color: var(--text-primary); margin-top: 2px; }
    .totals-stat .val small { font-size: 11px; color: var(--text-tertiary); margin-left: 4px; }

    .findings-list { display: flex; flex-direction: column; gap: 8px; }
    .finding-card {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; transition: all 0.15s; position: relative;
      border-left-width: 3px;
    }
    .finding-card.f-critical { border-left-color: #ff5555; }
    .finding-card.f-high     { border-left-color: #ff9040; }
    .finding-card.f-medium   { border-left-color: #ffb030; }
    .finding-card.f-low      { border-left-color: #5aa8ba; }
    .finding-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      margin-bottom: 8px;
    }
    .finding-title { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; }
    .finding-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 8px; }
    .finding-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em;
    }
    .finding-meta b { color: var(--text-secondary); font-weight: 500; }
    .finding-file {
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 10px;
      color: var(--cyan-dim); background: rgba(0, 191, 216, 0.06);
      padding: 1px 6px; border-radius: 3px;
    }
    .findings-empty {
      padding: 32px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
      background: var(--bg-tile); border: 1px dashed var(--border); border-radius: 10px;
    }

    /* Status pills on findings (Open / New / Fixed across scans) */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 4px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid;
      margin-left: 8px;
    }
    .status-new   { color: #00e5a8; border-color: rgba(0, 229, 168, 0.4); background: rgba(0, 229, 168, 0.08); }
    .status-open  { color: var(--text-tertiary); border-color: var(--border); background: transparent; }
    .status-fixed { color: var(--cyan); border-color: rgba(0, 191, 216, 0.4); background: rgba(0, 191, 216, 0.08); }

    /* Cross-scan summary banner above the findings list */
    .diff-banner {
      display: flex; gap: 18px; padding: 12px 16px;
      background: rgba(0, 191, 216, 0.04); border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 8px; margin-bottom: 14px;
      font-size: 12px; flex-wrap: wrap;
    }
    .diff-stat { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
    .diff-stat .num { font-size: 16px; font-weight: 500; color: var(--text-primary); }
    .diff-stat .num.new   { color: #00e5a8; }
    .diff-stat .num.fixed { color: var(--cyan); }
    .diff-stat .num.open  { color: var(--text-primary); }
    .diff-stat .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); }
    .diff-context { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; align-self: center; }

    /* LEVEL 2: REPORT DETAIL */
    .report-detail {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 24px 26px; line-height: 1.6;
    }
    .report-detail h1 { font-size: 22px; font-weight: 500; margin-bottom: 16px; color: var(--text-primary); }
    .report-detail h2 { font-size: 17px; font-weight: 500; margin-top: 24px; margin-bottom: 10px; color: var(--cyan); }
    .report-detail h3 { font-size: 14px; font-weight: 500; margin-top: 18px; margin-bottom: 8px; color: var(--text-primary); }
    .report-detail p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
    .report-detail ul, .report-detail ol { margin-left: 22px; margin-bottom: 12px; }
    .report-detail li { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .report-detail code {
      background: rgba(0, 191, 216, 0.1); padding: 2px 6px; border-radius: 4px;
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 12px; color: var(--cyan-bright);
    }
    .report-detail pre {
      background: rgba(0,0,0,0.35); padding: 14px 16px; border-radius: 8px; overflow-x: auto;
      margin-bottom: 14px; border: 1px solid var(--border);
    }
    .report-detail pre code { background: transparent; padding: 0; color: var(--text-secondary); }
    .report-detail table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 12px; }
    .report-detail th, .report-detail td {
      border: 1px solid var(--border); padding: 8px 12px; text-align: left; color: var(--text-secondary);
    }
    .report-detail th { background: rgba(0,191,216,0.08); color: var(--cyan); font-weight: 500; }
    .report-detail strong { color: var(--text-primary); font-weight: 600; }
    .report-detail hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .report-detail blockquote {
      border-left: 3px solid var(--cyan); padding-left: 14px; margin-bottom: 12px; color: var(--text-tertiary);
    }

    .download-bar {
      display: flex; gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .download-bar-top {
      margin-top: 0; padding-top: 0; padding-bottom: 18px; margin-bottom: 18px;
      border-top: none; border-bottom: 1px solid var(--border);
    }
    .download-btn {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: 11px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .download-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .loading, .error, .empty-state {
      padding: 40px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
    }
    .error { color: var(--bad); }

    .footer {
      max-width: 1100px; margin: 18px auto 0; padding: 0 18px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .footer .left { display: flex; align-items: center; gap: 8px; }
    .footer .mark {
      width: 6px; height: 6px; border-radius: 1px; background: var(--cyan-dim);
    }
    .footer a { color: var(--text-tertiary); text-decoration: none; transition: color 0.15s; }
    .footer a:hover { color: var(--cyan); }
    @media (max-width: 520px) {
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="titlebar">
        <div class="brand">
          <span class="brand-mark"></span>
          <span class="brand-text">GHOST PORTAL</span>
        </div>
        <span class="portal-tag" id="portal-tag">ejwisner · sandbox</span>
      </div>
      <div class="body" id="app-root">
        <div class="loading">Loading portal data...</div>
      </div>
    </div>
  </div>
  <footer class="footer">
    <div class="left">
      <span class="mark"></span>
      <span>Powered by Ghost Architect™</span>
    </div>
    <div>
      &copy; 2026 Ghost Architect™ · <a href="https://ghostarchitect.dev" target="_blank" rel="noopener">ghostarchitect.dev</a>
    </div>
  </footer>

  <script>
    // ── Configuration ────────────────────────────────────────────────
    const PORTAL_SLUG = 'ejwisner';
    const API_BASE = 'https://signup.ghostarchitect.dev';

    // ── Mode descriptions (plain English, for non-technical readers) ──
    const MODE_DESCRIPTIONS = {
      poi: {
        title: 'Points of Interest',
        body: "A first pass through the codebase that surfaces the issues most likely to matter — security risks, fragile patterns, hidden complexity. Think of it as a doctor's intake exam: it doesn't fix anything, but it tells you where to look first.",
      },
      blast: {
        title: 'Blast Radius',
        body: 'Before you change a piece of code, this tells you what else might break. Shows the ripple effect of touching a file — what depends on it, what it depends on, and how risky the change really is.',
      },
      conflict: {
        title: 'Conflict',
        body: 'Finds places where two parts of the codebase disagree with each other — different files claiming different things, configuration that contradicts the code, rules that fight each other. These are the bugs that only surface in production.',
      },
      recon: {
        title: 'Recon',
        body: "A scouting report on a codebase you don't know yet. Maps the major systems, the riskiest files, the team patterns, and the technical debt — everything you'd want to know before bidding on the work or hiring engineers to maintain it.",
      },
      audit: {
        title: 'Inheritance Audit',
        body: 'A done-for-you report on a codebase someone else built. Designed for the buyer, not the engineer — executive summary, dead extensions, end-of-life dependencies, and what an upgrade or rebuild would actually require.',
      },
      chat: {
        title: 'Chat',
        body: "An interactive conversation with the codebase. Ask questions in plain language, get answers grounded in the actual code. Useful for due diligence or onboarding when you don't know what to look for yet.",
      },
      compare: {
        title: 'Compare',
        body: 'Side-by-side analysis of two versions of the same codebase. Shows what changed, what got better, what got worse, and where the risk moved.',
      },
      dashboard: {
        title: 'Dashboard',
        body: 'A live overview of every scan run against this codebase. Tracks trends over time so you can see whether the situation is improving or getting worse.',
      },
    };

    // ── State ────────────────────────────────────────────────────────
    let manifest = null;
    let currentView = 'level0';  // 'level0' | 'level1' | 'level2'
    let currentMode = null;
    let currentReportId = null;
    let reportBodyCache = {};
    let findingsCache = {};       // report.id → parsed findings JSON
    let level2Tab = 'findings';   // 'findings' | 'report'  (per-render state)
    let findingsFilter = 'all';   // 'all' | 'critical' | 'high' | 'medium' | 'low'

    // ── Boot ─────────────────────────────────────────────────────────
    async function boot() {
      try {
        const res = await fetch(`${API_BASE}/portal-data?c=${PORTAL_SLUG}`);
        if (!res.ok) throw new Error(`portal-data ${res.status}`);
        manifest = await res.json();
        render();
      } catch (err) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Failed to load portal: ${err.message}</div>`;
      }
    }

    // ── Router (browser back button support) ─────────────────────────
    function navigate(view, mode, reportId) {
      currentView = view;
      currentMode = mode || null;
      currentReportId = reportId || null;
      // Level 0 clears the hash entirely so a refresh lands back home.
      // Passing the bare pathname strips any leftover #m=... from the URL.
      if (view === 'level0') {
        history.pushState({ view }, '', location.pathname + location.search);
      } else {
        const hash = view === 'level1' ? `#m=${mode}` : `#m=${mode}&r=${reportId}`;
        history.pushState({ view, mode, reportId }, '', hash);
      }
      render();
    }
    window.addEventListener('popstate', (e) => {
      if (e.state) {
        currentView = e.state.view;
        currentMode = e.state.mode;
        currentReportId = e.state.reportId;
      } else {
        currentView = 'level0';
        currentMode = null;
        currentReportId = null;
      }
      render();
    });
    function parseInitialHash() {
      const h = location.hash.replace(/^#/, '');
      if (!h) return;
      const params = new URLSearchParams(h);
      const mode = params.get('m');
      const reportId = params.get('r');
      if (mode && reportId) { currentView = 'level2'; currentMode = mode; currentReportId = reportId; }
      else if (mode) { currentView = 'level1'; currentMode = mode; }
    }

    // ── Render dispatch ──────────────────────────────────────────────
    function render() {
      if (currentView === 'level0') renderLevel0();
      else if (currentView === 'level1') renderLevel1();
      else if (currentView === 'level2') renderLevel2();
    }

    // ── LEVEL 0: Mode tile grid ──────────────────────────────────────
    function renderLevel0() {
      const total = manifest.totalReports;
      const modes = Object.entries(manifest.modeSummary)
        .sort((a, b) => a[1].order - b[1].order);

      const lastGenerated = modes
        .map(([_, v]) => v.lastGenerated)
        .filter(Boolean)
        .sort()
        .reverse()[0];

      const tilesHtml = modes.map(([modeKey, m]) => {
        const isEmpty = m.count === 0;
        const lastSeen = m.lastGenerated ? relativeTime(m.lastGenerated) : '—';
        const hasDescription = !!MODE_DESCRIPTIONS[modeKey];
        return `
          <div class="tile ${isEmpty ? 'empty' : ''}" ${!isEmpty ? `onclick="if(!event.target.closest('.info-icon'))navigate('level1','${modeKey}')"` : ''}>
            ${hasDescription ? `<button class="info-icon" onclick="event.stopPropagation();showModeModal('${modeKey}')" aria-label="What is ${m.label}" title="What is ${m.label}?">i</button>` : ''}
            ${!isEmpty ? '<div class="tile-arrow">↗</div>' : ''}
            <div class="tile-mode" style="margin-left: 28px;">${m.label}</div>
            <div><span class="tile-count">${m.count}</span><span class="tile-count-unit">report${m.count !== 1 ? 's' : ''}</span></div>
            <div class="tile-meta">${isEmpty ? 'No scans yet' : 'Last run ' + lastSeen}</div>
          </div>
        `;
      }).join('');

      document.getElementById('app-root').innerHTML = `
        <div class="hero">
          <div>
            <div class="hero-label">Total Reports</div>
            <div class="hero-value">${total}</div>
            <div class="hero-sub">across ${modes.filter(([_, m]) => m.count > 0).length} active modes</div>
          </div>
          <div class="hero-right">
            <div class="delta">Last scan ${lastGenerated ? relativeTime(lastGenerated) : '—'}</div>
            <div class="delta-sub">Updated ${formatDate(manifest.generatedAt)}</div>
          </div>
        </div>
        <div class="section-label">Scan Modes</div>
        <div class="tile-grid">${tilesHtml}</div>
      `;
    }

    // ── LEVEL 1: Mode dashboard / report list ────────────────────────
    // Groups reports by project name. Shows the latest scan per project as
    // the primary card. If a project has multiple scans, a History pill
    // exposes the older versions inline.
    function renderLevel1() {
      const reports = manifest.reports.filter(r => r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];
      if (!modeInfo) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Unknown mode: ${currentMode}</div>`;
        return;
      }

      // Group by project (case-insensitive, normalized).
      const groups = new Map();
      for (const r of reports) {
        const key = (r.project || '(untitled)').toLowerCase().trim();
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }
      // Sort each group newest-first; manifest is already that way but be safe.
      for (const g of groups.values()) {
        g.sort((a, b) => b.generatedIso.localeCompare(a.generatedIso));
      }
      // Group order: newest activity first.
      const groupArr = Array.from(groups.values())
        .sort((a, b) => b[0].generatedIso.localeCompare(a[0].generatedIso));

      const projectCount = groups.size;
      const latest = reports[0]?.generatedIso;
      const firstScan = reports.length
        ? reports.map(r => r.generatedIso).sort()[0]
        : null;

      const rowsHtml = groupArr.map(group => {
        const latestReport = group[0];
        const hasHistory = group.length > 1;
        const summary = latestReport.summary || '';
        const sev = latestReport.severityCounts;
        const sevTotal = latestReport.findingsTotal || 0;

        // Severity chips. Only show counts > 0 to keep rows clean.
        const sevChips = sev ? `
          <div class="severity-row">
            ${sev.critical > 0 ? `<span class="sev-chip sev-critical"><span class="dot"></span>${sev.critical} Critical</span>` : ''}
            ${sev.high > 0     ? `<span class="sev-chip sev-high"><span class="dot"></span>${sev.high} High</span>` : ''}
            ${sev.medium > 0   ? `<span class="sev-chip sev-medium"><span class="dot"></span>${sev.medium} Medium</span>` : ''}
            ${sev.low > 0      ? `<span class="sev-chip sev-low"><span class="dot"></span>${sev.low} Low</span>` : ''}
            ${sevTotal > 0     ? `<span class="sev-chip sev-total">${sevTotal} total finding${sevTotal !== 1 ? 's' : ''}</span>` : ''}
          </div>
        ` : '';

        const historyJson = hasHistory ? encodeURIComponent(JSON.stringify(group.map(r => ({
          id: r.id, generated: r.generated, generatedIso: r.generatedIso, tool: r.tool,
        })))) : '';
        const historyPill = hasHistory
          ? `<span class="history-pill" onclick="event.stopPropagation();showHistoryModal('${escapeAttr(latestReport.project)}','${historyJson}')" title="View history">History · ${group.length}</span>`
          : '';

        return `
          <div class="report-row" onclick="navigate('level2','${currentMode}','${latestReport.id}')">
            <div class="report-row-top">
              <div class="report-project">
                ${escapeHtml(latestReport.project)}${historyPill}
              </div>
              <div class="report-date">${formatDate(latestReport.generatedIso)}</div>
            </div>
            ${summary ? `<div class="report-summary">${escapeHtml(summary).slice(0, 240)}${summary.length > 240 ? '…' : ''}</div>` : ''}
            ${sevChips}
            <div class="report-meta">${escapeHtml(latestReport.tool || '')}${latestReport.filesAnalyzed ? ' · ' + escapeHtml(latestReport.filesAnalyzed) + ' files' : ''}</div>
          </div>
        `;
      }).join('');

      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level0')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / <b>${modeInfo.label}</b></div>
          <button class="back-btn export-btn" onclick="exportCurrentModeCsv()">Export CSV</button>
        </div>
        <div class="mode-stats">
          <div class="mode-stat">
            <div class="label">Projects</div>
            <div class="value">${projectCount}</div>
          </div>
          <div class="mode-stat">
            <div class="label">Total Scans</div>
            <div class="value">${reports.length}</div>
          </div>
          <div class="mode-stat">
            <div class="label">First Scan</div>
            <div class="value" style="font-size: 14px; padding-top: 6px;">${firstScan ? formatDate(firstScan) : '—'}</div>
          </div>
          <div class="mode-stat">
            <div class="label">Last Scan</div>
            <div class="value" style="font-size: 14px; padding-top: 6px;">${latest ? relativeTime(latest) : '—'}</div>
          </div>
        </div>
        <div class="section-label">Projects (${projectCount})</div>
        <div class="report-list">${rowsHtml || '<div class="empty-state">No reports in this mode yet.</div>'}</div>
      `;
    }

    // ── History modal ────────────────────────────────────────────────
    function showHistoryModal(projectName, historyJson) {
      const history = JSON.parse(decodeURIComponent(historyJson));
      const existing = document.getElementById('mode-modal-overlay');
      if (existing) existing.remove();

      const rowsHtml = history.map((h, idx) => `
        <div class="history-row" onclick="closeModeModal();navigate('level2','${currentMode}','${h.id}')"
             style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
                    background: var(--bg-tile); cursor: pointer; margin-bottom: 8px;
                    transition: all 0.15s; display: flex; align-items: center; justify-content: space-between;">
          <div>
            <div style="font-size: 12px; color: var(--text-primary); font-weight: 500;">
              ${idx === 0 ? '<span style="color: var(--cyan); margin-right: 6px;">▸ Latest</span>' : `Scan #${history.length - idx}`}
            </div>
            <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 2px;">
              ${escapeHtml(h.generated)} · ${escapeHtml(h.tool || '')}
            </div>
          </div>
          <span style="color: var(--cyan-dim); font-size: 14px;">↗</span>
        </div>
      `).join('');

      const overlay = document.createElement('div');
      overlay.id = 'mode-modal-overlay';
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true" style="max-width: 540px;">
          <button class="modal-close" aria-label="Close" onclick="closeModeModal()">×</button>
          <div class="modal-mode">Scan History</div>
          <div class="modal-title">${escapeHtml(projectName)}</div>
          <div class="modal-body" style="margin-top: 6px;">
            <div style="font-size: 12px; color: var(--text-tertiary); margin-bottom: 14px;">
              ${history.length} scans · oldest first
            </div>
            ${rowsHtml}
          </div>
        </div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModeModal();
      });
      document.body.appendChild(overlay);
      document.addEventListener('keydown', escClose);
    }

    function escapeAttr(s) {
      return String(s == null ? '' : s).replace(/['"<>&]/g, c => ({
        "'": '&#39;', '"': '&quot;', '<': '&lt;', '>': '&gt;', '&': '&amp;',
      }[c]));
    }

    // ── LEVEL 2: Report detail ───────────────────────────────────────
    // When the report has structured findings (hasStructuredFindings: true),
    // we show a Findings tab (default) and a Full Report tab. Otherwise we
    // just show the markdown body as before. Backwards compatible.
    async function renderLevel2() {
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];
      if (!report) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Report not found.</div>`;
        return;
      }

      // Reset per-report UI state when we enter a new report.
      // Default to 'findings' tab when structured data exists, 'report' otherwise.
      level2Tab = report.hasStructuredFindings ? 'findings' : 'report';
      findingsFilter = 'all';

      // Download buttons + breadcrumb scaffold (always present).
      const dlBar = `
        <div class="download-bar download-bar-top">
          ${report.files.md ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.md)}" target="_blank">MD</a>` : ''}
          ${report.files.pdf ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.pdf)}" target="_blank">PDF</a>` : ''}
          ${report.files.txt ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.txt)}" target="_blank">TXT</a>` : ''}
          ${report.files.findings ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.findings)}" target="_blank">JSON</a>` : ''}
        </div>
      `;
      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level1','${currentMode}')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / ${modeInfo.label} / <b>${escapeHtml(report.project)}</b></div>
        </div>
        ${dlBar}
        <div id="level2-content">
          <div class="loading">Loading report…</div>
        </div>
      `;

      await renderLevel2Content(report);
    }

    async function renderLevel2Content(report) {
      const container = document.getElementById('level2-content');
      if (!container) return;

      // If the report has structured findings, render tabs. Otherwise straight
      // to the markdown body.
      if (!report.hasStructuredFindings) {
        await renderReportBodyInto(container, report);
        return;
      }

      // Build the tab bar. We use a placeholder count until findings load.
      const findingsCount = findingsCache[report.id]?.findings?.length ?? null;
      const tabsHtml = `
        <div class="view-tabs">
          <button class="view-tab ${level2Tab === 'findings' ? 'active' : ''}"
                  onclick="switchLevel2Tab('findings')">
            Findings${findingsCount !== null ? `<span class="view-tab-count">${findingsCount}</span>` : ''}
          </button>
          <button class="view-tab ${level2Tab === 'report' ? 'active' : ''}"
                  onclick="switchLevel2Tab('report')">
            Full Report
          </button>
        </div>
        <div id="tab-content"></div>
      `;
      container.innerHTML = tabsHtml;
      const tabContent = document.getElementById('tab-content');

      if (level2Tab === 'findings') {
        await renderFindingsInto(tabContent, report);
      } else {
        await renderReportBodyInto(tabContent, report);
      }
    }

    function switchLevel2Tab(tab) {
      level2Tab = tab;
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      if (report) renderLevel2Content(report);
    }

    function setFindingsFilter(severity) {
      findingsFilter = severity;
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      if (report) renderLevel2Content(report);
    }

    // Cross-scan diffing: find the prior scan of the same project in the same
    // mode and compute Open/New/Fixed status for each finding by stable ID.
    // Returns { priorReport, priorFindings, statusMap } or null when no prior
    // scan exists.
    async function computeFindingsDiff(currentReport, currentFindings) {
      // Find all reports of the same mode + project, newest first.
      const sameProject = manifest.reports
        .filter(r => r.mode === currentReport.mode
                  && r.project === currentReport.project
                  && r.hasStructuredFindings)
        .sort((a, b) => b.generatedIso.localeCompare(a.generatedIso));

      const myIndex = sameProject.findIndex(r => r.id === currentReport.id);
      if (myIndex === -1 || myIndex >= sameProject.length - 1) return null;

      const priorReport = sameProject[myIndex + 1];

      // Fetch prior findings.json (cached if seen before)
      let priorData;
      try {
        if (findingsCache[priorReport.id]) {
          priorData = findingsCache[priorReport.id];
        } else {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(priorReport.files.findings)}`;
          const res = await fetch(url);
          if (!res.ok) return null;
          priorData = await res.json();
          findingsCache[priorReport.id] = priorData;
        }
      } catch (_) {
        return null;
      }

      const priorFindings = priorData.findings || [];
      const currentIds = new Set(currentFindings.map(f => f.id));
      const priorIds = new Set(priorFindings.map(f => f.id));

      const statusMap = {};
      for (const f of currentFindings) {
        statusMap[f.id] = priorIds.has(f.id) ? 'open' : 'new';
      }
      // Findings that were in the prior scan but not in this one are "fixed"
      const fixed = priorFindings.filter(f => !currentIds.has(f.id));

      return { priorReport, priorFindings, statusMap, fixed };
    }

    async function renderFindingsInto(container, report) {
      container.innerHTML = '<div class="loading">Loading findings…</div>';

      let data;
      try {
        if (findingsCache[report.id]) {
          data = findingsCache[report.id];
        } else {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.findings)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`findings ${res.status}`);
          data = await res.json();
          findingsCache[report.id] = data;
          // Update the tab badge with the real count now that we have data.
          const tabFindings = container.parentElement?.querySelector('.view-tab');
          if (tabFindings && !tabFindings.querySelector('.view-tab-count')) {
            const badge = document.createElement('span');
            badge.className = 'view-tab-count';
            badge.textContent = (data.findings || []).length;
            tabFindings.appendChild(badge);
          }
        }
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load findings: ${escapeHtml(err.message)}</div>`;
        return;
      }

      const findings = data.findings || [];
      const sev = data.severityCounts || {};
      const totals = data.totals || {};

      // Cross-scan diff (Open/New/Fixed). Null when this is the first scan.
      const diff = await computeFindingsDiff(report, findings);

      // Filter
      const filtered = findingsFilter === 'all'
        ? findings
        : findings.filter(f => (f.severity || '').toLowerCase() === findingsFilter);

      // Sort: severity rank then effort desc
      const sevRank = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
      filtered.sort((a, b) => {
        const ra = sevRank[a.severity] ?? 99;
        const rb = sevRank[b.severity] ?? 99;
        if (ra !== rb) return ra - rb;
        return (b.effortHours || 0) - (a.effortHours || 0);
      });

      const totalHrs = filtered.reduce((s, f) => s + (f.effortHours || 0), 0);
      const filterPill = (key, label, count, sevClass) => `
        <button class="filter-chip ${findingsFilter === key ? 'active ' + sevClass : ''}"
                onclick="setFindingsFilter('${key}')">
          ${label}${count != null ? ` · ${count}` : ''}
        </button>
      `;

      const toolbar = `
        <div class="findings-toolbar">
          <span class="findings-toolbar-label">Filter:</span>
          ${filterPill('all',      'All',                  findings.length, '')}
          ${filterPill('critical', 'Critical', sev.critical, 'sev-critical-active')}
          ${filterPill('high',     'High',     sev.high,     'sev-high-active')}
          ${filterPill('medium',   'Medium',   sev.medium,   'sev-medium-active')}
          ${filterPill('low',      'Low',      sev.low,      'sev-low-active')}
        </div>
      `;

      // Diff banner — only shown when a prior scan exists.
      const diffBanner = diff ? (() => {
        const newCount = Object.values(diff.statusMap).filter(s => s === 'new').length;
        const openCount = Object.values(diff.statusMap).filter(s => s === 'open').length;
        const fixedCount = diff.fixed.length;
        return `
          <div class="diff-banner">
            <div class="diff-stat"><span class="num new">${newCount}</span><span class="lbl">New</span></div>
            <div class="diff-stat"><span class="num open">${openCount}</span><span class="lbl">Open</span></div>
            <div class="diff-stat"><span class="num fixed">${fixedCount}</span><span class="lbl">Fixed</span></div>
            <div class="diff-context">vs. scan from ${formatDate(diff.priorReport.generatedIso)}</div>
          </div>
        `;
      })() : '';

      const totalsBar = `
        <div class="totals-bar">
          <div class="totals-stat">
            <div class="lbl">Findings</div>
            <div class="val">${filtered.length}<small>of ${findings.length}</small></div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Effort</div>
            <div class="val">${totalHrs.toFixed(1)}<small>hours</small></div>
          </div>
          ${totals.totalCost ? `
          <div class="totals-stat">
            <div class="lbl">Est. Cost</div>
            <div class="val">$${Number(totals.totalCost).toLocaleString()}</div>
          </div>` : ''}
          <div class="totals-stat">
            <div class="lbl">Scan Date</div>
            <div class="val" style="font-size: 13px; padding-top: 4px;">${formatDate(report.generatedIso)}</div>
          </div>
        </div>
      `;

      const cardsHtml = filtered.length === 0
        ? '<div class="findings-empty">No findings match the current filter.</div>'
        : filtered.map(f => {
            const sevKey = (f.severity || '').toLowerCase();
            const sevClass = `f-${sevKey}`;
            const sevChip = `<span class="sev-chip sev-${sevKey}"><span class="dot"></span>${escapeHtml(f.severity || '—')}</span>`;
            const filesHtml = (f.files || []).slice(0, 4).map(file =>
              `<span class="finding-file">${escapeHtml(file)}</span>`
            ).join(' ');
            const overflow = (f.files || []).length > 4 ? ` <span class="finding-meta">+${f.files.length - 4} more</span>` : '';
            const effortLabel = f.effortHours
              ? `<span><b>Effort:</b> ${f.effortHours}h</span>` : '';
            const confidenceLabel = (f.confidence != null)
              ? `<span><b>Confidence:</b> ${f.confidence}%</span>` : '';

            // Status pill (Open/New) from cross-scan diff
            const status = diff?.statusMap?.[f.id];
            const statusPill = status === 'new'
              ? '<span class="status-pill status-new">● New</span>'
              : status === 'open'
                ? '<span class="status-pill status-open">Open</span>'
                : '';

            return `
              <div class="finding-card ${sevClass}">
                <div class="finding-card-top">
                  <div class="finding-title">${escapeHtml(f.title || '(untitled)')}${statusPill}</div>
                  ${sevChip}
                </div>
                ${f.detail ? `<div class="finding-detail">${escapeHtml(f.detail)}</div>` : ''}
                <div class="finding-meta">
                  ${filesHtml}${overflow}
                  ${effortLabel}
                  ${confidenceLabel}
                </div>
              </div>
            `;
          }).join('');

      // Fixed findings section — only when diff is available and there are any.
      const fixedHtml = (diff && diff.fixed.length > 0) ? (() => {
        const cards = diff.fixed.map(f => {
          const sevKey = (f.severity || '').toLowerCase();
          return `
            <div class="finding-card f-${sevKey}" style="opacity: 0.65;">
              <div class="finding-card-top">
                <div class="finding-title" style="text-decoration: line-through; color: var(--text-tertiary);">
                  ${escapeHtml(f.title || '(untitled)')}
                  <span class="status-pill status-fixed">✓ Fixed</span>
                </div>
                <span class="sev-chip sev-${sevKey}"><span class="dot"></span>${escapeHtml(f.severity || '—')}</span>
              </div>
              <div class="finding-meta">
                ${(f.files || []).slice(0, 3).map(file => `<span class="finding-file">${escapeHtml(file)}</span>`).join(' ')}
              </div>
            </div>
          `;
        }).join('');
        return `
          <div class="section-label" style="margin-top: 22px;">Fixed since last scan</div>
          <div class="findings-list">${cards}</div>
        `;
      })() : '';

      container.innerHTML = diffBanner + toolbar + totalsBar + `<div class="findings-list">${cardsHtml}</div>` + fixedHtml;
    }

    async function renderReportBodyInto(container, report) {
      container.innerHTML = '<div class="report-detail" id="report-body"><div class="loading">Loading report…</div></div>';

      // Fetch body. Prefer .md, fall back to .txt for older reports.
      let body;
      let isPlainText = false;
      if (reportBodyCache[report.id]) {
        body = reportBodyCache[report.id].body;
        isPlainText = reportBodyCache[report.id].isPlainText;
      } else {
        const bodyFile = report.files.md || report.files.txt;
        if (!bodyFile) {
          document.getElementById('report-body').innerHTML =
            `<div class="error">No body available for this report.</div>`;
          return;
        }
        isPlainText = !report.files.md && !!report.files.txt;
        try {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(bodyFile)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`report ${res.status}`);
          body = await res.text();
          reportBodyCache[report.id] = { body, isPlainText };
        } catch (err) {
          document.getElementById('report-body').innerHTML =
            `<div class="error">Failed to load report: ${escapeHtml(err.message)}</div>`;
          return;
        }
      }

      const html = isPlainText
        ? `<pre style="white-space: pre-wrap; font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 12px; background: transparent; border: none; padding: 0;">${escapeHtml(body)}</pre>`
        : mdToHtml(body);
      document.getElementById('report-body').innerHTML = html;
    }

    // ── Mode info modal ──────────────────────────────────
    function showModeModal(modeKey) {
      const desc = MODE_DESCRIPTIONS[modeKey];
      if (!desc) return;
      const existing = document.getElementById('mode-modal-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'mode-modal-overlay';
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
          <button class="modal-close" aria-label="Close" onclick="closeModeModal()">×</button>
          <div class="modal-mode">Scan Mode</div>
          <div class="modal-title" id="modal-title">${escapeHtml(desc.title)}</div>
          <div class="modal-body">${escapeHtml(desc.body)}</div>
        </div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModeModal();
      });
      document.body.appendChild(overlay);
      document.addEventListener('keydown', escClose);
    }
    function closeModeModal() {
      const overlay = document.getElementById('mode-modal-overlay');
      if (overlay) overlay.remove();
      document.removeEventListener('keydown', escClose);
    }
    function escClose(e) {
      if (e.key === 'Escape') closeModeModal();
    }

    // ── CSV export for current mode ────────────────────────────────
    function exportCurrentModeCsv() {
      if (!currentMode || !manifest) return;
      const reports = manifest.reports.filter(r => r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];

      const headers = ['Project', 'Generated', 'Tool', 'Files Analyzed', 'Summary', 'MD', 'PDF', 'TXT'];
      const rows = reports.map(r => [
        r.project,
        r.generated,
        r.tool,
        r.filesAnalyzed || '',
        (r.summary || '').replace(/\s+/g, ' ').trim(),
        r.files.md  ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.md)}`  : '',
        r.files.pdf ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.pdf)}` : '',
        r.files.txt ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.txt)}` : '',
      ]);

      // Escape CSV: double-quote fields, escape internal quotes by doubling them.
      const escape = (v) => {
        const s = String(v == null ? '' : v);
        return `"${s.replace(/"/g, '""')}"`;
      };
      const lines = [
        headers.map(escape).join(','),
        ...rows.map(row => row.map(escape).join(',')),
      ];
      // Excel-friendly: prepend BOM so UTF-8 is detected correctly.
      const csv = '\uFEFF' + lines.join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${PORTAL_SLUG}-${currentMode}-reports-${today}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Markdown → HTML (lightweight, no external lib) ───────────────
    function mdToHtml(md) {
      // Tables (basic 2-column GFM table)
      md = md.replace(/((?:\|[^\n]+\|\n)+)/g, (m) => {
        const rows = m.trim().split('\n').map(r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim()));
        if (rows.length < 2) return m;
        // Skip alignment row if present
        const alignmentRow = rows[1] && rows[1].every(c => /^:?-+:?$/.test(c));
        const header = rows[0];
        const dataRows = alignmentRow ? rows.slice(2) : rows.slice(1);
        const thead = `<thead><tr>${header.map(h => `<th>${inlineMd(h)}</th>`).join('')}</tr></thead>`;
        const tbody = `<tbody>${dataRows.map(r => `<tr>${r.map(c => `<td>${inlineMd(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
        return `<table>${thead}${tbody}</table>`;
      });
      // Code fences
      md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      // Headings
      md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // HR
      md = md.replace(/^---+$/gm, '<hr>');
      // Blockquote
      md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // Lists
      md = md.replace(/(?:^[-*] .+\n?)+/gm, (block) => {
        const items = block.trim().split('\n').map(l => l.replace(/^[-*] /, '').trim()).filter(Boolean);
        return `<ul>${items.map(i => `<li>${inlineMd(i)}</li>`).join('')}</ul>`;
      });
      md = md.replace(/(?:^\d+\. .+\n?)+/gm, (block) => {
        const items = block.trim().split('\n').map(l => l.replace(/^\d+\. /, '').trim()).filter(Boolean);
        return `<ol>${items.map(i => `<li>${inlineMd(i)}</li>`).join('')}</ol>`;
      });
      // Paragraphs (any line that's not already a block element)
      md = md.split(/\n\n+/).map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';
        if (/^<(h\d|table|pre|ul|ol|hr|blockquote)/.test(trimmed)) return trimmed;
        return `<p>${inlineMd(trimmed.replace(/\n/g, ' '))}</p>`;
      }).join('\n');
      return md;
    }

    function inlineMd(s) {
      // Inline code
      s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
      // Bold
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Italic (single asterisk, no greedy)
      s = s.replace(/(^|[^*])\*([^*\n]+)\*([^*]|$)/g, '$1<em>$2</em>$3');
      // Links
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--cyan)">$1</a>');
      return s;
    }

    // ── Helpers ──────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function relativeTime(iso) {
      if (!iso) return '—';
      const now = Date.now();
      const then = new Date(iso).getTime();
      const seconds = Math.floor((now - then) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months}mo ago`;
      return `${Math.floor(months / 12)}y ago`;
    }

    // Initial state from URL hash
    parseInitialHash();
    boot();
  </script>
