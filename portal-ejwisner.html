          container.innerHTML = `<div class="brief-no-data">No commits${watchDateFilter === 'all' ? ' scanned yet' : ' in the selected date range'}.</div>`;
          return;
        }
        container.innerHTML = `<div class="watch-list">${commits.map(renderWatchRow).join('')}</div>`;
        return;
      }

      if (watchTab === 'findings') {
        // Commit filter pills — only shown when multiple commits are in range
        const filteredForPills = getFilteredWatchCommits();
        const commitPills = filteredForPills.length > 1 ? `
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center;">
            <span style="font-size:11px;color:var(--text-tertiary);margin-right:2px;">Commit:</span>
            <button class="watch-date-pill ${watchCommitFilter === 'all' ? 'active' : ''}" onclick="setWatchCommitFilter('all')">All</button>
            ${filteredForPills.map(c => {
              const short = c.commitShort || (c.commitHash || '').slice(0, 7);
              return `<button class="watch-date-pill ${watchCommitFilter === short ? 'active' : ''}" onclick="setWatchCommitFilter('${escapeHtml(short)}')">${escapeHtml(short)}</button>`;
            }).join('')}
          </div>` : '';

        // Degraded-run warning: surface a banner if any commit in the filtered
        // set had its blast narrator fail and fell back to raw findings.
        const degradedCommits = commits.filter(c => c.narratorFailed);
        const degradedBanner = degradedCommits.length ? `
          <div style="background:rgba(255,194,102,0.08);border:1px solid rgba(255,194,102,0.35);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;">
            <span style="font-size:18px;line-height:1;">⚠️</span>
            <div>
              <div style="font-weight:600;color:#ffc266;font-size:13px;">Degraded Results on ${degradedCommits.length === 1 ? '1 Commit' : degradedCommits.length + ' Commits'}</div>
              <div style="margin-top:3px;font-size:12px;color:#a89060;line-height:1.5;">A connection interruption prevented Ghost Watcher™ from narrating the Blast Radius findings. Raw findings are shown — quality may be lower than usual.</div>
              ${GITHUB_REPO ? `<div style="margin-top:6px;"><a href="https://github.com/${GITHUB_REPO}/actions" target="_blank" style="font-size:12px;color:#ffc266;text-decoration:none;font-weight:600;">↗ Rerun in GitHub Actions</a></div>` : `<div style="margin-top:6px;font-size:12px;color:#a89060;">Rerun the Ghost Watcher™ job in your CI to regenerate full results.</div>`}
            </div>
          </div>` : '';
        const commitsForFindings = watchCommitFilter === 'all'
          ? commits
          : commits.filter(c => (c.commitShort || (c.commitHash || '').slice(0, 7)) === watchCommitFilter);
        const allFindings = commitsForFindings.flatMap(r =>
          (r.findings || []).map(f => ({ ...f, commitShort: r.commitShort, branch: r.branch }))
        );
        // @ghost-verified findings — segregated, informational, no action.
        // Computed BEFORE the empty-active guard so a commit whose findings are
        // all verified still surfaces them below.
        const verifiedFindings = commitsForFindings.flatMap(r =>
          (r.verifiedFindings || []).map(f => ({ ...f, commitShort: r.commitShort, branch: r.branch }))
        );
        const verifiedSection = verifiedFindings.length ? (() => {
          const cards = verifiedFindings.map(f => {
            const file = Array.isArray(f.files) && f.files.length ? f.files[0] : (f.file || '');
            const reason = f.verifiedReason
              ? `<div style="margin-top:4px;font-size:12px;color:#888;font-style:italic;line-height:1.5;">${escapeHtml(f.verifiedReason)}</div>`
              : '';
            return `
              <div style="background:#161616;border-left:3px solid rgba(74,222,128,0.4);border-radius:6px;padding:10px 12px;margin-bottom:6px;">
                <div style="font-weight:600;color:#bbb;">${escapeHtml(f.title || 'Untitled')}</div>
                ${file ? `<div style="margin-top:4px;font-size:11px;color:#666;font-family:monospace;">${escapeHtml(file)}</div>` : ''}
                ${reason}
                <div style="margin-top:4px;font-size:11px;color:#555;">
                  ${f.commitShort ? 'Commit ' + escapeHtml(f.commitShort) : ''}${f.branch ? ' · ' + escapeHtml(f.branch) : ''}
                </div>
              </div>`;
          }).join('');
          return `
            <div style="margin-top:18px;border-top:1px solid #222;padding-top:12px;">
              <div onclick="const b=this.parentElement.querySelector('.vf-body');const open=b.style.display!=='none';b.style.display=open?'none':'block';this.querySelector('.vf-chevron').textContent=open?'▸':'▾';" style="cursor:pointer;display:flex;align-items:center;gap:8px;color:rgba(74,222,128,0.75);font-weight:600;font-size:13px;user-select:none;">
                <span class="vf-chevron">▸</span>
                <span>✅ ${verifiedFindings.length} · Reviewed · Expected Behavior</span>
              </div>
              <div class="vf-body" style="display:none;margin-top:8px;">
                <div style="font-size:11px;color:#666;margin-bottom:8px;">Reviewed · Expected Behavior. No action required.</div>
                ${cards}
              </div>
            </div>`;
        })() : '';

        if (!allFindings.length) {
          if (!verifiedFindings.length) {
            container.innerHTML = commitPills + `<div class="brief-no-data">No findings${watchDateFilter === 'all' ? ' across watched commits' : ' in the selected date range'}.</div>`;
            return;
          }
          container.innerHTML = commitPills + degradedBanner + `<div class="brief-no-data" style="margin-bottom:8px;">No active findings${watchDateFilter === 'all' ? ' across watched commits' : ' in the selected date range'}.</div>` + verifiedSection;
          return;
        }
        const sevOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
        allFindings.sort((a, b) => (sevOrder[(a.severity || '').toUpperCase()] ?? 9) - (sevOrder[(b.severity || '').toUpperCase()] ?? 9));
        const rows = allFindings.map(f => {
          const sev = (f.severity || '').toLowerCase();
          const sevColor = sev === 'critical' ? '#ff5555' : sev === 'high' ? '#ff9040' : sev === 'medium' ? '#ffb030' : '#5aa8ba';
          const raw = f.detail || '';
          return `
            <div class="report-row" style="cursor:default;border-left:3px solid ${sevColor};">
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <div style="font-weight:600;color:#fff;">${escapeHtml(f.title || 'Untitled')}</div>
                <div style="font-size:11px;color:${sevColor};font-weight:700;">${f.severity || '—'}</div>
              </div>
              ${raw ? `<div style="margin-top:4px;font-size:12px;color:#888;line-height:1.5;">${escapeHtml(raw.slice(0, 180))}${raw.length > 180 ? '…' : ''}</div>` : ''}
              <div style="margin-top:4px;font-size:11px;color:#555;">
                ${f.commitShort ? 'Commit ' + escapeHtml(f.commitShort) : ''}${f.branch ? ' · ' + escapeHtml(f.branch) : ''}
              </div>
            </div>
          `;
        }).join('');
        container.innerHTML = commitPills + degradedBanner + rows + verifiedSection;
        return;
      }

      if (watchTab === 'prompts') {
        // Commit filter pills — only shown when multiple commits are in range
        const filteredForPills = getFilteredWatchCommits();
        const commitPills = filteredForPills.length > 1 ? `
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center;">
            <span style="font-size:11px;color:var(--text-tertiary);margin-right:2px;">Commit:</span>
            <button class="watch-date-pill ${watchCommitFilter === 'all' ? 'active' : ''}" onclick="setWatchCommitFilter('all')">All</button>
            ${filteredForPills.map(c => {
              const short = c.commitShort || (c.commitHash || '').slice(0, 7);
              return `<button class="watch-date-pill ${watchCommitFilter === short ? 'active' : ''}" onclick="setWatchCommitFilter('${escapeHtml(short)}')">${escapeHtml(short)}</button>`;
            }).join('')}
          </div>` : '';

        const commitsForPrompts = watchCommitFilter === 'all'
          ? commits
          : commits.filter(c => (c.commitShort || (c.commitHash || '').slice(0, 7)) === watchCommitFilter);
        const allPrompts = commitsForPrompts.flatMap(r =>
          (r.brief?.prompts || []).map(p => ({ ...p, commitShort: r.commitShort, branch: r.branch }))
        );
        if (!allPrompts.length) {
          container.innerHTML = `<div class="brief-no-data">No Ghost Brief™ prompts${watchDateFilter === 'all' ? ' yet. Ghost Watcher™ generates prompts automatically after each commit scan' : ' in the selected date range'}.</div>`;
          return;
        }
        allPrompts.sort((a, b) => (a.blast_score || 0) - (b.blast_score || 0));
        const cards = allPrompts.map((p, idx) => renderWatchPromptCard(p, `wpp-${idx}`)).join('');
        container.innerHTML = commitPills + `<div class="brief-prompt-list">${cards}</div>`;
      }
    }

    // Dashboard sub-tab — aggregate overview of the date-filtered commit set:
    // headline cards, token/cost rollup, severity distribution bar, and a
    // sparkline-style findings trend. Every number reads the already-filtered
    // `commits` array, so the date pills scope the whole view.
    function renderWatchDashboard(commits) {
      if (!commits.length) {
        return `<div class="brief-no-data">No commits${watchDateFilter === 'all' ? ' scanned yet' : ' in the selected date range'}.</div>`;
      }

      const commitCount  = commits.length;
      const findingTotal = commits.reduce((n, c) => n + (c.findingCount || 0), 0);
      const promptTotal  = commits.reduce((n, c) => n + (c.brief?.prompts?.length || c.briefPromptCount || 0), 0);
      const pendingCount = commits.filter(c => c.status === 'pending').length;
      const scanned      = commits.filter(c => c.status !== 'pending').length;
      const cleanCount   = commits.filter(c => c.status !== 'pending' && (c.findingCount || 0) === 0).length;
      const cleanRate    = scanned ? Math.round((cleanCount / scanned) * 100) : 0;

      // Token + cost rollup. Commits predating token telemetry carry a null
      // tokenUsage and contribute 0.
      let inTok = 0, outTok = 0, cost = 0;
      commits.forEach(c => {
        const t = c.tokenUsage;
        if (!t) return;
        inTok  += t.inputTokens  || 0;
        outTok += t.outputTokens || 0;
        cost   += t.estimatedCostUsd || 0;
      });

      const sev = { critical: 0, high: 0, medium: 0, low: 0 };
      commits.forEach(c => {
        const s = c.severity || {};
        sev.critical += s.critical || 0;
        sev.high     += s.high     || 0;
        sev.medium   += s.medium   || 0;
        sev.low      += s.low      || 0;
      });
      const sevTotal = sev.critical + sev.high + sev.medium + sev.low;

      const fmtNum = (n) => n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k' : String(n);

      const cards = [
        { lbl: 'Commits',       val: String(commitCount) },
        { lbl: 'Findings',      val: String(findingTotal) },
        { lbl: 'Prompts',       val: String(promptTotal) },
        { lbl: 'Clean Rate',    val: cleanRate + '<small>%</small>' },
        { lbl: 'Analyzing',     val: String(pendingCount) },
        { lbl: 'Input Tokens',  val: fmtNum(inTok) },
        { lbl: 'Output Tokens', val: fmtNum(outTok) },
        { lbl: 'Est. Cost',     val: `<span style="color:var(--good);">$${cost.toFixed(2)}</span>` },
      ].map(c => `
        <div class="watch-dash-card">
          <div class="lbl">${c.lbl}</div>
          <div class="val">${c.val}</div>
        </div>`).join('');

      const sevColors = { critical: '#ff5555', high: '#ff9040', medium: '#ffb030', low: '#5aa8ba' };
      let sevBar;
      if (!sevTotal) {
        sevBar = `<div class="watch-dash-sevempty">No findings across these commits. All clean.</div>`;
      } else {
        const segs = ['critical','high','medium','low'].map(k => {
          const n = sev[k];
          if (!n) return '';
          return `<div class="watch-dash-seg" style="width:${(n / sevTotal) * 100}%;background:${sevColors[k]};" title="${n} ${k}"></div>`;
        }).join('');
        const legend = ['critical','high','medium','low'].map(k => {
          if (!sev[k]) return '';
          return `<span class="watch-dash-legitem"><span class="dot" style="background:${sevColors[k]};"></span>${sev[k]} ${k.charAt(0).toUpperCase()+k.slice(1)}</span>`;
        }).join('');
        sevBar = `<div class="watch-dash-sevbar">${segs}</div><div class="watch-dash-legend">${legend}</div>`;
      }

      return `
        <div class="watch-dash-grid">${cards}</div>
        <div class="watch-dash-section">
          <div class="watch-dash-title">Severity Distribution</div>
          ${sevBar}
        </div>
        <div class="watch-dash-section">
          <div class="watch-dash-title">Findings Trend</div>
          ${renderWatchTrend(commits)}
        </div>`;
    }

    // Monday-start week bucket for an ISO-week sparkline.
    function isoWeekStart(d) {
      const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const dow = (dt.getDay() + 6) % 7;   // Mon=0 .. Sun=6
      dt.setDate(dt.getDate() - dow);
      return dt;
    }
    // Sparkline-style findings trend. Daily buckets for short windows
    // (Today / 7D), ISO-week buckets otherwise. Keeps the most recent 12.
    function renderWatchTrend(commits) {
      const daily = watchDateFilter === 'today' || watchDateFilter === '7d';
      const buckets = new Map();   // bucketTime -> { start: Date, findings: number }
      commits.forEach(c => {
        if (!c.timestamp) return;
        const t = new Date(c.timestamp);
        if (!Number.isFinite(t.getTime())) return;
        const start = daily
          ? new Date(t.getFullYear(), t.getMonth(), t.getDate())
          : isoWeekStart(t);
        const key = start.getTime();
        if (!buckets.has(key)) buckets.set(key, { start, findings: 0 });
        buckets.get(key).findings += (c.findingCount || 0);
      });

      let rows = Array.from(buckets.values()).sort((a, b) => a.start - b.start);
      if (rows.length > 12) rows = rows.slice(rows.length - 12);

      if (rows.length === 0) {
        return `<div class="watch-dash-sevempty">No commits in this date range</div>`;
      }

      const max = rows.reduce((m, r) => Math.max(m, r.findings), 0) || 1;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const bars = rows.map(r => {
        const h = Math.max(2, Math.round((r.findings / max) * 100));
        return `<div class="watch-dash-bar" style="height:${h}%;" title="${r.findings} finding${r.findings !== 1 ? 's' : ''}"></div>`;
      }).join('');
      const labels = rows.map(r =>
        `<div class="watch-dash-xlabel">${months[r.start.getMonth()]} ${r.start.getDate()}</div>`
      ).join('');

      const note = rows.length === 1
        ? `<div class="watch-dash-trendnote">Trend builds as more commits are scanned.</div>`
        : '';

      return `
        <div class="watch-dash-trend">
          <div class="watch-dash-yaxis"><span>${max}</span><span>0</span></div>
          <div class="watch-dash-plotcol">
            <div class="watch-dash-bars">${bars}</div>
            <div class="watch-dash-xlabels">${labels}</div>
          </div>
        </div>${note}`;
    }

    // Commit row — our card design with pending pulse, Clean chip, severity
    // chips and an expandable drawer.
    function renderWatchRow(c) {
      const hash = (c.commitShort || (c.commitHash || '').slice(0, 7)) || '———';
      const isPending = c.status === 'pending';
      const isCancelled = c.status === 'cancelled';
      const sev = c.severity || {};
      const total = c.findingCount || 0;
      const expanded = watchExpanded.has(hash);

      let accent = 'is-clean';
      if (isCancelled) accent = 'is-cancelled';
      else if (isPending) accent = 'is-pending';
      else if (sev.critical > 0) accent = 'has-critical';
      else if (sev.high > 0) accent = 'has-high';
      else if (sev.medium > 0) accent = 'has-medium';
      else if (sev.low > 0) accent = 'has-low';

      let rightHtml;
      if (isCancelled) {
        rightHtml = `<span style="font-size:12px;color:#888;">Cancelled</span>`;
      } else if (isPending) {
        rightHtml = `<span class="watch-pending-badge">⏳ Analyzing…</span>`;
      } else if (total === 0) {
        rightHtml = `<span class="watch-clean-chip">✓ Clean</span>`;
      } else {
        const chips = ['critical','high','medium','low'].map(k => {
          const n = sev[k] || 0;
          if (!n) return '';
          return `<span class="sev-chip sev-${k}"><span class="dot"></span>${n} ${k.charAt(0).toUpperCase()+k.slice(1)}</span>`;
        }).join('');
        rightHtml = chips + `<span class="sev-chip sev-total">${total} total</span>${c.narratorFailed ? `<span style="margin-left:6px;font-size:10px;color:#ffc266;font-weight:600;vertical-align:middle;" title="Blast narrator failed — findings shown unnarrated. Quality may be lower than usual.">⚠️ degraded</span>` : ''}`;
        if (c.briefPromptCount > 0) {
          rightHtml += `<span class="sev-chip sev-total">${c.briefPromptCount} prompt${c.briefPromptCount !== 1 ? 's' : ''}</span>`;
        }
      }

      return `
        <div class="watch-row ${accent} ${expanded ? 'expanded' : ''}" onclick="toggleWatchExpand('${escapeHtml(hash)}')">
          <div class="watch-row-top">
            <div class="watch-row-left">
              <span class="watch-hash">${escapeHtml(hash)}</span>
              <span class="watch-branch">${escapeHtml(c.branch || '—')}</span>
              <span class="watch-dev">${escapeHtml(c.developer || 'unknown')}</span>
            </div>
            <div class="watch-row-right">
              ${rightHtml}
              <span class="watch-time">${c.timestamp ? relativeTime(c.timestamp) : ''}</span>
              <span class="watch-caret">▶</span>
            </div>
          </div>
          ${renderWatchDrawer(c)}
        </div>`;
    }

    // Click-to-expand a watch finding inside a commit drawer. stopPropagation
    // keeps the click from bubbling to the parent .watch-row and collapsing the
    // whole commit drawer. One finding open at a time within a drawer; clicks
    // inside the open body do not collapse it.
    function toggleWatchFindingExpand(cardEl, ev) {
      if (ev) ev.stopPropagation();
      if (!cardEl) return;
      if (ev && ev.target.closest('.watch-finding-expand')) return;
      const willExpand = !cardEl.classList.contains('expanded');
      const scope = cardEl.closest('.watch-drawer') || document;
      scope.querySelectorAll('.watch-finding.expanded').forEach(c => {
        if (c !== cardEl) c.classList.remove('expanded');
      });
      cardEl.classList.toggle('expanded', willExpand);
    }

    function renderWatchDrawer(c) {
      if (c.status === 'cancelled') {
        return `<div class="watch-drawer"><div class="watch-finding-detail">This Ghost Watcher™ run was cancelled before it completed. Push a new commit to trigger a fresh scan.</div></div>`;
      }
      if (c.status === 'pending') {
        return `<div class="watch-drawer"><div class="watch-finding-detail">Ghost Watcher™ is analyzing this commit. Results will appear here automatically.</div></div>`;
      }
      const findings = Array.isArray(c.findings) ? c.findings : [];
      const prompts = c.brief?.prompts || [];
      if (!findings.length && !prompts.length) {
        return `<div class="watch-drawer"><div class="watch-finding-detail">No findings for this commit. Ghost Watcher™ scanned the change and flagged nothing.</div></div>`;
      }
      const promptByFindingId = new Map((c.brief?.prompts || []).map(p => [p.source_finding_id, p]));
      const items = findings.map((f, i) => {
        const sev = (f.severity || 'medium').toLowerCase();
        const raw = f.detail || '';
        const detail = raw.slice(0, 150);
        const ellipsis = raw.length > 150 ? '…' : '';
        const filesArr = f.files || [];
        const allFiles = filesArr.map(file => `<span class="finding-file">${escapeHtml(file)}</span>`).join(' ');
        const effort = f.effortHours ? `<span><b>Effort:</b> ${f.effortHours}h</span>` : '';
        const conf = (f.confidence != null) ? `<span><b>Confidence:</b> ${f.confidence}%</span>` : '';
        const matched = f.id ? promptByFindingId.get(f.id) : null;
        let remediationHtml;
        if (matched && matched.prompt) {
          const key = `wpf-${c.commitShort}-${i}`;
          watchPromptRegistry[key] = matched.prompt;
          remediationHtml = `
                <div class="remediation-placeholder">
                  <div class="rp-title">Remediation Prompt</div>
                  <div class="brief-collapse-body open" style="margin-top:6px;">${escapeHtml(matched.prompt)}</div>
                  <button class="watch-finding-copy-btn" onclick="event.stopPropagation(); copyWatchPrompt('${key}');">Copy Prompt</button>
                </div>`;
        } else {
          remediationHtml = `
                <div class="remediation-placeholder">
                  <div class="rp-title">Remediation Prompt</div>
                  <div class="rp-body">Generating detailed remediation prompts. Check back after your next Ghost Watcher™ scan.</div>
                  <button class="watch-finding-copy-btn" onclick="event.stopPropagation();" disabled title="Copy will be available once detailed prompts ship">Copy Prompt</button>
                </div>`;
        }
        return `
          <div class="watch-finding expandable" onclick="toggleWatchFindingExpand(this, event)">
            <div class="watch-finding-top">
              <span class="sev-chip sev-${sev}"><span class="dot"></span>${sev.charAt(0).toUpperCase()+sev.slice(1)}</span>
              <span class="watch-finding-title">${escapeHtml(f.title || '(untitled finding)')}</span>
              <span class="watch-finding-chevron">▶</span>
            </div>
            ${detail ? `<div class="watch-finding-detail">${escapeHtml(detail)}${ellipsis}</div>` : ''}
            <div class="watch-finding-expand">
              <div class="watch-finding-expand-inner">
                ${raw ? `<div class="finding-expand-label">Detail</div><div class="watch-finding-detail-full">${escapeHtml(raw)}</div>` : ''}
                ${allFiles ? `<div class="finding-expand-label">Affected Files (${filesArr.length})</div><div class="finding-files-full">${allFiles}</div>` : ''}
                ${(effort || conf) ? `<div class="finding-meta" style="margin-bottom:10px;">${effort}${conf}</div>` : ''}
                ${remediationHtml}
              </div>
            </div>
          </div>`;
      }).join('');

      let promptsHtml = '';
      if (prompts.length) {
        const cards = prompts.map((p, idx) => renderWatchPromptCard(p, `wp-${c.commitShort}-${idx}`)).join('');
        promptsHtml = `
          <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
            <div style="font-size:10px;letter-spacing:0.16em;color:var(--brief);text-transform:uppercase;margin-bottom:10px;font-weight:600;">Ghost Brief™ — ${prompts.length} Prompt${prompts.length !== 1 ? 's' : ''}</div>
            <div class="brief-prompt-list">${cards}</div>
          </div>`;
      }

      return `<div class="watch-drawer">${items}${promptsHtml}</div>`;
    }

    function toggleWatchExpand(hash) {
      if (!hash) return;
      if (watchExpanded.has(hash)) watchExpanded.delete(hash);
      else watchExpanded.add(hash);
      renderWatchContent();
    }

    // Shared Ghost Brief™ prompt card (Prompts tab + commit drawer). Registers
    // the prompt text under `key` so Copy can retrieve it without embedding
    // multi-line text in an inline handler.
    function renderWatchPromptCard(p, key) {
      watchPromptRegistry[key] = p.prompt || '';
      const sev = (p.severity || 'medium').toLowerCase();
      const blast = (p.blast_radius || 'surgical').toLowerCase();
      const files = (p.files?.primary || []).map(f => `<span class="brief-file-chip">${escapeHtml(f)}</span>`).join('');
      return `
        <div class="brief-prompt-card f-${sev}" style="margin-bottom:8px;">
          <div class="brief-prompt-top">
            <span class="gb-badge">${escapeHtml(p.id || 'GB-???')}</span>
            <span class="brief-prompt-title">${escapeHtml(p.title || 'Untitled')}</span>
          </div>
          <div class="brief-prompt-badges">
            <span class="sev-chip sev-${sev}"><span class="dot"></span>${escapeHtml(p.severity || 'Medium')}</span>
            <span class="blast-chip blast-${blast}">${escapeHtml(p.blast_radius || 'surgical')}</span>
            ${p.commitShort ? `<span style="font-size:10px;color:var(--text-tertiary);align-self:center;">Commit ${escapeHtml(p.commitShort)}</span>` : ''}
          </div>
          ${files ? `<div class="brief-files">${files}</div>` : ''}
          <div class="brief-collapsible">
            <button class="brief-collapse-toggle" onclick="toggleBriefCollapse('${key}', this)"><span>▶ Prompt</span></button>
            <button class="brief-copy-btn" onclick="copyWatchPrompt('${key}')">Copy</button>
            <div class="brief-collapse-body" id="${key}">${escapeHtml(p.prompt || '')}</div>
          </div>
        </div>`;
    }

    function copyWatchPrompt(key) {
      const text = watchPromptRegistry[key];
      if (text == null) return;
      navigator.clipboard.writeText(text).then(() =>
        showToast('Copied', 'Prompt copied to clipboard')
      );
    }

    // ── Ghost Brief panel render ──────────────────────────────────────
    async function renderBriefPanel() {
      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level0')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / <b>Ghost Brief™</b></div>
        </div>
        <div id="brief-panel-content"><div class="loading">Loading Ghost Brief™…</div></div>
      `;
      await fetchBriefData();
      renderBriefContent();
    }

    function renderBriefContent() {
      const container = document.getElementById('brief-panel-content');
      if (!container) return;

      const promptCount = briefData?.summary?.total_prompts || 0;

      // Context banner — only when we have real Brief data
      const bannerHtml = briefData ? (() => {
        const src = briefData.source || {};
        const scanLabel = src.scan_mode === 'multi' && Array.isArray(src.contributing_modes)
          ? src.contributing_modes.join(' + ')
          : (src.scan_mode || 'scan');
        const genDate = briefData.generated_at
          ? new Date(briefData.generated_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
          : '';
        const n = promptCount;
        const plural = n !== 1;
        return `
          <div class="brief-context-banner">
            <div class="brief-context-icon">📋</div>
            <div class="brief-context-body">
              <div class="brief-context-headline">
                Ghost scanned your codebase and found <strong>${n} issue${plural ? 's' : ''}</strong>.
              </div>
              <div class="brief-context-sub">
                ${plural ? 'These' : 'This'} ${n} prompt${plural ? 's' : ''} ${plural ? 'were' : 'was'} generated from your
                <strong>${escapeHtml(scanLabel)}</strong> scan${genDate ? ' on ' + genDate : ''}.
                Feed them into Claude Code, Cursor, or Copilot — smallest blast radius first.
                Ghost does not touch your code. Ghost briefs the AI. The AI fixes it.
              </div>
            </div>
          </div>`;
      })() : '';

      container.innerHTML = `
        ${bannerHtml}
        <div class="view-tabs brief-tabs">
          <button class="view-tab ${briefTab === 'overview'    ? 'active' : ''}" onclick="switchBriefTab('overview')">Overview</button>
          <button class="view-tab ${briefTab === 'prompts'     ? 'active' : ''}" onclick="switchBriefTab('prompts')">
            Prompts${briefData ? `<span class="view-tab-count">${promptCount}</span>` : ''}
          </button>
          <button class="view-tab ${briefTab === 'regenerate'  ? 'active' : ''}" onclick="switchBriefTab('regenerate')">Regenerate</button>
        </div>
        <div id="brief-tab-content"></div>
      `;
      renderBriefTab();
    }

    function switchBriefTab(tab) {
      briefTab = tab;
      renderBriefContent();
    }

    function renderBriefTab() {
      const container = document.getElementById('brief-tab-content');
      if (!container) return;

      if (briefTab === 'overview') {
        if (!briefData) {
          container.innerHTML = `<div class="brief-no-data">No Ghost Brief™ found. Use the Regenerate tab for instructions.</div>`;
          return;
        }
        const s = briefData.summary || {};
        const src = briefData.source || {};
        const sev = s.by_severity || {};
        const blast = s.by_blast_radius || {};

        const sevChips = ['critical','high','medium','low'].map(k => {
          const n = sev[k] || 0;
          if (!n) return '';
          return `<span class="sev-chip sev-${k}"><span class="dot"></span>${n} ${k.charAt(0).toUpperCase()+k.slice(1)}</span>`;
        }).join('');
        const blastChips = ['surgical','moderate','broad'].map(k => {
          const n = blast[k] || 0;
          if (!n) return '';
          return `<span class="blast-chip blast-${k}">${n} ${k.charAt(0).toUpperCase()+k.slice(1)}</span>`;
        }).join('');

        const dlUrl = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent('briefs/ghost-brief-latest.json')}`;

        container.innerHTML = `
          <div class="brief-card">
            <div class="brief-card-title">Summary</div>
            <div class="brief-stats-grid">
              <div class="brief-stat">
                <div class="lbl">Total Prompts</div>
                <div class="val">${s.total_prompts || 0}</div>
              </div>
              <div class="brief-stat">
                <div class="lbl">Est. Agent Hours</div>
                <div class="val">${s.estimated_agent_hours != null ? s.estimated_agent_hours : '—'}<small>h</small></div>
              </div>
            </div>
            ${sevChips ? `<div class="brief-sev-row">${sevChips}</div>` : ''}
            ${blastChips ? `<div class="brief-blast-row">${blastChips}</div>` : ''}
            <div style="margin-top: 16px;">
              <a class="brief-dl-btn" href="${dlUrl}" target="_blank" download="ghost-brief.json">
                ↓ Download ghost-brief.json
              </a>
            </div>
          </div>

          <div class="brief-card">
            <div class="brief-card-title">Source</div>
            <div class="brief-source-row">
              <div class="brief-source-kv"><b>Scan Mode:</b> ${escapeHtml(src.scan_mode || '—')}</div>
              ${src.contributing_modes ? `<div class="brief-source-kv"><b>Contributing Modes:</b> ${escapeHtml(src.contributing_modes.join(', '))}</div>` : ''}
              <div class="brief-source-kv"><b>Generated:</b> ${briefData.generated_at ? formatDate(briefData.generated_at) : '—'}</div>
              <div class="brief-source-kv"><b>Ghost Version:</b> ${escapeHtml(briefData.ghost_version || '—')}</div>
              <div class="brief-source-kv"><b>Codebase Root:</b> <span style="font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--cyan-dim);">${escapeHtml(src.codebase_root || '—')}</span></div>
              <div class="brief-source-kv"><b>Source File:</b> <span style="font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--cyan-dim);">${escapeHtml(src.scan_file || '—')}</span></div>
            </div>
          </div>
        `;
        return;
      }

      if (briefTab === 'prompts') {
        if (!briefData || !Array.isArray(briefData.prompts) || briefData.prompts.length === 0) {
          container.innerHTML = `<div class="brief-no-data">No prompts in this Brief.</div>`;
          return;
        }
        const sorted = [...briefData.prompts].sort((a, b) => (a.blast_score || 0) - (b.blast_score || 0));
        const cardsHtml = sorted.map((p, idx) => {
          const sev = (p.severity || 'medium').toLowerCase();
          const blast = (p.blast_radius || 'surgical').toLowerCase();
          const primaryFiles = (p.files?.primary || []).map(f =>
            `<span class="brief-file-chip">${escapeHtml(f)}</span>`).join('');
          const tags = (p.tags || []).map(t =>
            `<span class="brief-tag-pill">${escapeHtml(t)}</span>`).join('');
          const hints = Array.isArray(p.validation_hints)
            ? '<ul style="margin: 6px 0 0 16px;">' + p.validation_hints.map(h => `<li style="font-size:11px;color:var(--text-secondary);margin-bottom:3px;">${escapeHtml(h)}</li>`).join('') + '</ul>'
            : '';
          const promptId = `bp-${idx}`;
          const hintsId = `bh-${idx}`;
          return `
            <div class="brief-prompt-card f-${sev}">
              <div class="brief-prompt-top">
                <span class="gb-badge">${escapeHtml(p.id || 'GB-???')}</span>
                <span class="brief-prompt-title">${escapeHtml(p.title || 'Untitled')}</span>
              </div>
              <div class="brief-prompt-badges">
                <span class="sev-chip sev-${sev}"><span class="dot"></span>${sev.charAt(0).toUpperCase()+sev.slice(1)}</span>
                <span class="blast-chip blast-${blast}">${blast.charAt(0).toUpperCase()+blast.slice(1)}</span>
                ${p.blast_score != null ? `<span style="font-size:10px;color:var(--text-tertiary);align-self:center;">blast ${p.blast_score}</span>` : ''}
              </div>
              ${primaryFiles ? `<div class="brief-files">${primaryFiles}</div>` : ''}
              ${tags ? `<div style="margin-bottom: 8px;">${tags}</div>` : ''}
              <div class="brief-collapsible">
                <button class="brief-collapse-toggle" onclick="toggleBriefCollapse('${promptId}', this)">
                  <span>▶ Prompt</span>
                </button>
                <button class="brief-copy-btn" onclick="copyBriefPrompt(${idx})">Copy</button>
                <div class="brief-collapse-body" id="${promptId}">${escapeHtml(p.prompt || '')}</div>
              </div>
              ${hints ? `
              <div class="brief-collapsible">
                <button class="brief-collapse-toggle" onclick="toggleBriefCollapse('${hintsId}', this)">
                  <span>▶ Validation Hints</span>
                </button>
                <div class="brief-collapse-body brief-hints-body" id="${hintsId}">${hints}</div>
              </div>` : ''}
            </div>
          `;
        }).join('');
        container.innerHTML = `<div class="brief-prompt-list">${cardsHtml}</div>`;
        return;
      }

      if (briefTab === 'regenerate') {
        const cmd = 'ghost --brief --input=ghost-report.json';
        const genAt = briefData?.generated_at ? formatDate(briefData.generated_at) : null;

        const historyHtml = briefHistory.length
          ? briefHistory.map(f => {
              const stamp = f.name.replace('ghost-brief-', '').replace('.json', '').replace('T', ' ').replace(/-/g, (m, o) => o < 10 ? '-' : ':');
              const dlHref = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent('briefs/' + f.name)}`;
              return `
                <div class="brief-history-row">
                  <span>${escapeHtml(stamp)}</span>
                  <a href="${dlHref}" target="_blank" download="${f.name}">↓ Download</a>
                </div>
              `;
            }).join('')
          : '<div style="font-size:12px;color:var(--text-tertiary);padding:8px 0;">No archived briefs found.</div>';

        container.innerHTML = `
          <div class="brief-regen-card">
            <div class="brief-card-title">Generate a New Brief</div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.65;margin-bottom:4px;">
              Ghost Brief™ is generated from the CLI. Run the command below inside your codebase directory
              after completing a scan. The output file <code style="font-size:11px;background:rgba(0,191,216,0.1);padding:1px 5px;border-radius:3px;color:var(--cyan-bright);">ghost-brief.json</code>
              is automatically pushed to this portal.
            </p>
            <div class="brief-cmd-block">
              <span class="brief-cmd-text">${escapeHtml(cmd)}</span>
              <button class="brief-copy-btn" onclick="navigator.clipboard.writeText('${escapeHtml(cmd)}').then(()=>showToast('Copied','Command copied to clipboard'))">Copy</button>
            </div>
            ${genAt ? `<p style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">Current Brief generated: <b style="color:var(--text-secondary);">${genAt}</b></p>` : ''}
          </div>

          <div class="brief-regen-card">
            <div class="brief-card-title">Brief History</div>
            ${historyHtml}
          </div>
        `;
        return;
      }
    }

    function toggleBriefCollapse(id, btn) {
      const body = document.getElementById(id);
      if (!body) return;
      const isOpen = body.classList.toggle('open');
      const span = btn.querySelector('span');
      if (span) span.textContent = (isOpen ? '▼ ' : '▶ ') + span.textContent.replace(/^[▼▶] /, '');
    }

    function copyBriefPrompt(idx) {
      if (!briefData || !briefData.prompts) return;
      const sorted = [...briefData.prompts].sort((a, b) => (a.blast_score || 0) - (b.blast_score || 0));
      const p = sorted[idx];
      if (!p) return;
      navigator.clipboard.writeText(p.prompt || '').then(() =>
        showToast('Copied', `${p.id}: prompt text copied to clipboard`)
      );
    }

    // ── LEVEL 1: Mode dashboard / report list ────────────────────────
    // Groups reports by project name. Shows the latest scan per project as
    function renderLevel1() {
      const reports = manifest.reports.filter(r => r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];
      if (!modeInfo) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Unknown mode: ${currentMode}</div>`;
        return;
      }

      // Group by project (case-insensitive, normalized).
      const groups = new Map();
      for (const r of reports) {
        const key = (r.project || '(untitled)').toLowerCase().trim();
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }
      // Sort each group newest-first; manifest is already that way but be safe.
      for (const g of groups.values()) {
        g.sort((a, b) => b.generatedIso.localeCompare(a.generatedIso));
      }
      // Group order: newest activity first.
      const groupArr = Array.from(groups.values())
        .sort((a, b) => b[0].generatedIso.localeCompare(a[0].generatedIso));

      const projectCount = groups.size;
      const latest = reports[0]?.generatedIso;
      const firstScan = reports.length
        ? reports.map(r => r.generatedIso).sort()[0]
        : null;

      const rowsHtml = groupArr.map(group => {
        const latestReport = group[0];
        const hasHistory = group.length > 1;
        const summary = latestReport.summary || '';
        const sev = latestReport.severityCounts;
        const sevTotal = latestReport.findingsTotal || 0;

        // Severity chips. Only show counts > 0 to keep rows clean.
        // Dashboard mode is excluded because its manifest entry uses a placeholder
        // (all open findings dumped into 'medium') — rendering chips would lie.
        // Tracked: portal-publish.js dashboard manifest entry needs real severity counts.
        const sevChips = (sev && latestReport.mode !== 'dashboard') ? `
          <div class="severity-row">
            ${sev.critical > 0 ? `<span class="sev-chip sev-critical"><span class="dot"></span>${sev.critical} Critical</span>` : ''}
            ${sev.high > 0     ? `<span class="sev-chip sev-high"><span class="dot"></span>${sev.high} High</span>` : ''}
            ${sev.medium > 0   ? `<span class="sev-chip sev-medium"><span class="dot"></span>${sev.medium} Medium</span>` : ''}
            ${sev.low > 0      ? `<span class="sev-chip sev-low"><span class="dot"></span>${sev.low} Low</span>` : ''}
            ${sevTotal > 0     ? `<span class="sev-chip sev-total">${sevTotal} total finding${sevTotal !== 1 ? 's' : ''}</span>` : ''}
          </div>
        ` : '';

        const historyJson = hasHistory ? encodeURIComponent(JSON.stringify(group.map(r => ({
          id: r.id, generated: r.generated, generatedIso: r.generatedIso, tool: r.tool,
        })))) : '';
        const historyPill = hasHistory
          ? `<span class="history-pill" onclick="event.stopPropagation();showHistoryModal('${escapeAttr(latestReport.project)}','${historyJson}')" title="View history">History · ${group.length}</span>`
          : '';

        return `
          <div class="report-row ${multiSelectMode ? 'selectable' : ''}" onclick="${multiSelectMode ? `toggleMultiSelect('${latestReport.id}')` : `navigate('level2','${currentMode}','${latestReport.id}')`}">
            ${multiSelectMode ? `<input type="checkbox" class="ms-check" ${multiSelectIds.has(latestReport.id) ? 'checked' : ''} onclick="event.stopPropagation();toggleMultiSelect('${latestReport.id}')">` : ''}
            <div class="report-row-top">
              <div class="report-project">
                ${escapeHtml(latestReport.project)}${historyPill}
              </div>
              <div class="report-date">${formatDate(latestReport.generatedIso)}</div>
            </div>
            ${summary ? `<div class="report-summary">${escapeHtml(summary).slice(0, 240)}${summary.length > 240 ? '…' : ''}</div>` : ''}
            ${sevChips}
            <div class="report-meta">${escapeHtml(latestReport.tool || '')}${latestReport.filesAnalyzed ? ' · ' + escapeHtml(latestReport.filesAnalyzed) + ' files' : ''}</div>
          </div>
        `;
      }).join('');

      // Expose all reports in this mode on window for multi-scan export to access
      window.__currentLevel1Reports = reports;

      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level0')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / <b>${modeInfo.label}</b></div>
          <div style="margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
            <button class="back-btn" onclick="toggleMultiSelectMode()" title="Select multiple scans to export as one consolidated Jira import.">${multiSelectMode ? '✓ Multi-Select On' : 'Multi-Select Scans'}</button>
            <button class="back-btn" onclick="exportCurrentModeCsv()">Export CSV</button>
          </div>
        </div>
        ${multiSelectMode ? `
          <div class="multi-select-bar active">
            <span class="ms-label">Multi-Scan Export</span>
            <span class="ms-count">${multiSelectIds.size} of ${reports.length} selected</span>
            <button class="jira-btn" onclick="selectAllInMode()">Select All</button>
            <button class="jira-btn" onclick="clearMultiSelect()">Clear</button>
            <button class="jira-btn primary" onclick="openJiraExportModal('multi-scan')" ${multiSelectIds.size === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
              <span class="icon"></span>Export ${multiSelectIds.size} Scans as One Epic
            </button>
          </div>
        ` : ''}
        <div class="mode-stats">
          <div class="mode-stat">
            <div class="label">Projects</div>
            <div class="value">${projectCount}</div>
          </div>
          <div class="mode-stat">
            <div class="label">Total Scans</div>
            <div class="value">${reports.length}</div>
          </div>
          <div class="mode-stat">
            <div class="label">First Scan</div>
            <div class="value" style="font-size: 14px; padding-top: 6px;">${firstScan ? formatDate(firstScan) : '—'}</div>
          </div>
          <div class="mode-stat">
            <div class="label">Last Scan</div>
            <div class="value" style="font-size: 14px; padding-top: 6px;">${latest ? relativeTime(latest) : '—'}</div>
          </div>
        </div>
        <div class="section-label">Projects (${projectCount})</div>
        <div class="report-list">${rowsHtml || '<div class="empty-state">No reports in this mode yet.</div>'}</div>
      `;
    }

    // ── History modal ────────────────────────────────────────────────
    function showHistoryModal(projectName, historyJson) {
      const history = JSON.parse(decodeURIComponent(historyJson));
      const existing = document.getElementById('mode-modal-overlay');
      if (existing) existing.remove();

      const rowsHtml = history.map((h, idx) => `
        <div class="history-row" onclick="closeModeModal();navigate('level2','${currentMode}','${h.id}')"
             style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
                    background: var(--bg-tile); cursor: pointer; margin-bottom: 8px;
                    transition: all 0.15s; display: flex; align-items: center; justify-content: space-between;">
          <div>
            <div style="font-size: 12px; color: var(--text-primary); font-weight: 500;">
              ${idx === 0 ? '<span style="color: var(--cyan); margin-right: 6px;">▸ Latest</span>' : `Scan #${history.length - idx}`}
            </div>
            <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 2px;">
              ${escapeHtml(h.generated)} · ${escapeHtml(h.tool || '')}
            </div>
          </div>
          <span style="color: var(--cyan-dim); font-size: 14px;">↗</span>
        </div>
      `).join('');

      const overlay = document.createElement('div');
      overlay.id = 'mode-modal-overlay';
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true" style="max-width: 540px;">
          <button class="modal-close" aria-label="Close" onclick="closeModeModal()">×</button>
          <div class="modal-mode">Scan History</div>
          <div class="modal-title">${escapeHtml(projectName)}</div>
          <div class="modal-body" style="margin-top: 6px;">
            <div style="font-size: 12px; color: var(--text-tertiary); margin-bottom: 14px;">
              ${history.length} scans · oldest first
            </div>
            ${rowsHtml}
          </div>
        </div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModeModal();
      });
      document.body.appendChild(overlay);
      document.addEventListener('keydown', escClose);
    }

    function escapeAttr(s) {
      return String(s == null ? '' : s).replace(/['"<>&]/g, c => ({
        "'": '&#39;', '"': '&quot;', '<': '&lt;', '>': '&gt;', '&': '&amp;',
      }[c]));
    }

    // ── LEVEL 2: Report detail ───────────────────────────────────────
    // When the report has structured findings (hasStructuredFindings: true),
    // we show a Findings tab (default) and a Full Report tab. Otherwise we
    // just show the markdown body as before. Backwards compatible.
    async function renderLevel2() {
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];
      if (!report) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Report not found.</div>`;
        return;
      }

      // Reset per-report UI state when we enter a new report.
      // Default to 'findings' tab when structured data exists, 'report' otherwise.
      level2Tab = report.hasStructuredFindings ? 'findings' : 'report';
      findingsFilter = 'all';

      // Download buttons + breadcrumb scaffold (always present).
      const dlBar = `
        <div class="download-bar download-bar-top">
          ${report.files.md ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.md)}" target="_blank">MD</a>` : ''}
          ${report.files.pdf ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.pdf)}" target="_blank">PDF</a>` : ''}
          ${report.files.txt ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.txt)}" target="_blank">TXT</a>` : ''}
          ${report.files.findings ? `<a class="download-btn" href="${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.findings)}" target="_blank">JSON</a>` : ''}
        </div>
      `;
      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level1','${currentMode}')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / ${modeInfo.label} / <b>${escapeHtml(report.project)}</b></div>
        </div>
        ${dlBar}
        <div id="level2-content">
          <div class="loading">Loading report…</div>
        </div>
      `;

      await renderLevel2Content(report);
    }

    async function renderLevel2Content(report) {
      const container = document.getElementById('level2-content');
      if (!container) return;

      // Dashboard mode has its own renderer — cross-project rollup, not a
      // single-scan finding list. The dashboard sidecar has a different
      // schema (projects + aggregateCounts + remainingFindings) so the
      // generic findings tab wouldn't render it correctly.
      if (report.mode === 'dashboard') {
        await renderDashboardInto(container, report);
        return;
      }

      // If the report has structured findings, render tabs. Otherwise straight
      // to the markdown body.
      if (!report.hasStructuredFindings) {
        await renderReportBodyInto(container, report);
        return;
      }

      // Build the tab bar. We use a placeholder count until findings load.
      const findingsCount = findingsCache[report.id]?.findings?.length ?? null;
      const tabsHtml = `
        <div class="view-tabs">
          <button class="view-tab ${level2Tab === 'findings' ? 'active' : ''}"
                  onclick="switchLevel2Tab('findings')">
            Findings${findingsCount !== null ? `<span class="view-tab-count">${findingsCount}</span>` : ''}
          </button>
          <button class="view-tab ${level2Tab === 'report' ? 'active' : ''}"
                  onclick="switchLevel2Tab('report')">
            Full Report
          </button>
        </div>
        <div id="tab-content"></div>
      `;
      container.innerHTML = tabsHtml;
      const tabContent = document.getElementById('tab-content');

      if (level2Tab === 'findings') {
        await renderFindingsInto(tabContent, report);
      } else {
        await renderReportBodyInto(tabContent, report);
      }
    }

    function switchLevel2Tab(tab) {
      level2Tab = tab;
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      if (report) renderLevel2Content(report);
    }

    function setFindingsFilter(severity) {
      findingsFilter = severity;
      const report = manifest.reports.find(r => r.id === currentReportId && r.mode === currentMode);
      if (report) renderLevel2Content(report);
    }

    // Click-to-expand a finding card. One card open at a time within the
    // findings view; clicking the open card again collapses it. Toggles a class
    // on the live DOM node (no re-render) so the max-height CSS transition
    // animates. Clicks inside the open drawer are ignored so text selection and
    // future controls don't collapse the card.
    function toggleFindingExpand(cardEl, ev) {
      if (!cardEl) return;
      if (ev && ev.target.closest('.finding-expand')) return;
      const willExpand = !cardEl.classList.contains('expanded');
      const scope = cardEl.closest('#tab-content') || document;
      scope.querySelectorAll('.finding-card.expanded').forEach(c => {
        if (c !== cardEl) c.classList.remove('expanded');
      });
      cardEl.classList.toggle('expanded', willExpand);
    }

    // Cross-scan diffing: find the prior scan of the same project in the same
    // mode and compute Open/New/Fixed status for each finding by stable ID.
    // Returns { priorReport, priorFindings, statusMap } or null when no prior
    // scan exists.
    async function computeFindingsDiff(currentReport, currentFindings) {
      // Find all reports of the same mode + project, newest first.
      const sameProject = manifest.reports
        .filter(r => r.mode === currentReport.mode
                  && r.project === currentReport.project
                  && r.hasStructuredFindings)
        .sort((a, b) => b.generatedIso.localeCompare(a.generatedIso));

      const myIndex = sameProject.findIndex(r => r.id === currentReport.id);
      if (myIndex === -1 || myIndex >= sameProject.length - 1) return null;

      const priorReport = sameProject[myIndex + 1];

      // Fetch prior findings.json (cached if seen before)
      let priorData;
      try {
        if (findingsCache[priorReport.id]) {
          priorData = findingsCache[priorReport.id];
        } else {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(priorReport.files.findings)}`;
          const res = await fetch(url);
          if (!res.ok) return null;
          priorData = await res.json();
          findingsCache[priorReport.id] = priorData;
        }
      } catch (_) {
        return null;
      }

      const priorFindings = priorData.findings || [];
      const currentIds = new Set(currentFindings.map(f => f.id));
      const priorIds = new Set(priorFindings.map(f => f.id));

      const statusMap = {};
      for (const f of currentFindings) {
        statusMap[f.id] = priorIds.has(f.id) ? 'open' : 'new';
      }
      // Findings that were in the prior scan but not in this one are "fixed"
      const fixed = priorFindings.filter(f => !currentIds.has(f.id));

      return { priorReport, priorFindings, statusMap, fixed };
    }

    // ── Dashboard view ────────────────────────────────────────────
    // Renders the cross-project remediation rollup. The "report" here is the
    // canonical dashboard manifest entry, and its findings file is actually
    // a dashboard.json with shape:
    //   { projects: [...], aggregateCounts: {...}, remainingFindings: [...] }
    // We render projects as progress-bar cards and stash remainingFindings
    // on window.__currentFindings so the Jira export buttons can find them.
    async function renderDashboardInto(container, report) {
      container.innerHTML = '<div class="loading">Loading dashboard…</div>';

      let data;
      try {
        if (findingsCache[report.id]) {
          data = findingsCache[report.id];
        } else {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.findings)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`dashboard ${res.status}`);
          data = await res.json();
          findingsCache[report.id] = data;
        }
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load dashboard: ${escapeHtml(err.message)}</div>`;
        return;
      }

      const projects = data.projects || [];
      const ag       = data.aggregateCounts || {};
      const remaining = data.remainingFindings || [];

      // Stash remainingFindings on window so the Jira export modal can pick
      // them up via window.__currentFindings — same channel the per-scan
      // findings view uses, so executeJiraExport requires no changes.
      window.__currentFindings = remaining;
      window.__currentReport   = report;
      window.__currentDiff     = null;  // dashboard has no per-scan diff

      // Aggregate stats bar (analog to totals-bar on findings view)
      const totalsBar = `
        <div class="totals-bar">
          <div class="totals-stat">
            <div class="lbl">Projects</div>
            <div class="val">${projects.length}</div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Baseline</div>
            <div class="val">${ag.totalBaseline || 0}<small>findings</small></div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Resolved</div>
            <div class="val" style="color: var(--good);">${ag.totalResolved || 0}</div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Open</div>
            <div class="val" style="color: var(--warn);">${ag.totalRemaining || 0}</div>
          </div>
          <div class="totals-stat">
            <div class="lbl">New</div>
            <div class="val">${ag.totalNewIssues || 0}</div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Avg Progress</div>
            <div class="val">${ag.avgProgress || 0}<small>%</small></div>
          </div>
        </div>
      `;

      // Jira export toolbar — uses the same modal as the findings view.
      // The 'epic-stories' mode wraps the aggregated remainingFindings into
      // a single Epic + Stories CSV, exactly the "aggregated Jira batch
      // across all projects" behavior you asked for.
      const jiraToolbar = `
        <div class="findings-toolbar">
          <span class="findings-toolbar-label">Aggregated export:</span>
          <div class="jira-cluster" style="margin-left: 0;">
            <button class="jira-btn primary" onclick="openJiraExportModal('epic-stories')"
              title="Export ALL open findings across ALL projects as one Jira batch (Epic + Stories/Bugs).">
              <span class="icon"></span>Export ${remaining.length} Open Finding${remaining.length === 1 ? '' : 's'} as Jira Batch
            </button>
            <button class="jira-btn" onclick="openJiraExportModal('stories-only')"
              title="Export open findings as standalone Stories/Bugs (no Epic).">
              <span class="icon"></span>Stories Only
            </button>
          </div>
        </div>
      `;

      // Empty state — no projects tracked yet.
      if (projects.length === 0) {
        container.innerHTML = totalsBar + `
          <div class="findings-empty">
            No labeled projects yet. Run a scan with a project label from the Ghost CLI to start tracking remediation across scans.
          </div>
        `;
        return;
      }

      // Project rows with progress bars — sorted by activity score (descending).
      // Score = scanCount × (progress/100) × 10 + scanCount
      // The ×10 weight ensures resolution % dominates over raw scan count.
      // Tie-break: higher scan count wins. Zero-progress single-scan projects sink.
      const projectCards = [...projects].sort((a, b) => {
        const scoreA = (a.scanCount || 0) * ((a.progress || 0) / 100) * 10 + (a.scanCount || 0);
        const scoreB = (b.scanCount || 0) * ((b.progress || 0) / 100) * 10 + (b.scanCount || 0);
        return scoreB - scoreA;
      }).map(p => {
        const safeProgress = Math.max(0, Math.min(100, Number.isFinite(p.progress) ? p.progress : 0));
        const filled = Math.max(0, Math.min(40, Math.round(safeProgress / 2.5)));
        const empty  = Math.max(0, 40 - filled);
        const bar    = '█'.repeat(filled) + '░'.repeat(empty);

        const progressColor = safeProgress >= 75 ? 'var(--good)'
                            : safeProgress >= 40 ? 'var(--cyan)'
                            : safeProgress > 0   ? 'var(--warn)'
                            : 'var(--text-tertiary)';

        return `
          <div class="finding-card">
            <div class="finding-card-top">
              <div class="finding-title">${escapeHtml(p.label)}</div>
              <span class="sev-chip sev-total">${p.scanCount || 0} scan${(p.scanCount || 0) === 1 ? '' : 's'}</span>
            </div>
            <div style="font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 13px; color: ${progressColor}; margin: 10px 0 6px; letter-spacing: 0.5px;">
              ${bar} ${safeProgress}%
            </div>
            <div class="finding-meta">
              <span><b>Baseline:</b> ${p.baselineDate || '(unknown)'}</span>
              <span><b>Last scan:</b> ${p.lastScan || '(unknown)'}</span>
              <span><b>Baseline findings:</b> ${p.baseline || 0}</span>
              <span><b>Resolved:</b> ${p.resolved || 0}</span>
              <span><b>Remaining:</b> ${p.remaining || 0}</span>
              ${p.newIssues > 0 ? `<span style="color: var(--warn);"><b>New:</b> ${p.newIssues}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = totalsBar + jiraToolbar + `
        <div class="section-label" style="margin-top: 18px;">Projects (${projects.length})</div>
        <div class="findings-list">${projectCards}</div>
      `;
    }

    async function renderFindingsInto(container, report) {
      container.innerHTML = '<div class="loading">Loading findings…</div>';

      let data;
      try {
        if (findingsCache[report.id]) {
          data = findingsCache[report.id];
        } else {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(report.files.findings)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`findings ${res.status}`);
          data = await res.json();
          findingsCache[report.id] = data;
          // Update the tab badge with the real count now that we have data.
          const tabFindings = container.parentElement?.querySelector('.view-tab');
          if (tabFindings && !tabFindings.querySelector('.view-tab-count')) {
            const badge = document.createElement('span');
            badge.className = 'view-tab-count';
            badge.textContent = (data.findings || []).length;
            tabFindings.appendChild(badge);
          }
        }
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load findings: ${escapeHtml(err.message)}</div>`;
        return;
      }

      const findings = data.findings || [];
      const sev = data.severityCounts || {};
      const totals = data.totals || {};

      // Cross-scan diff (Open/New/Fixed). Null when this is the first scan.
      const diff = await computeFindingsDiff(report, findings);

      // Filter
      const filtered = findingsFilter === 'all'
        ? findings
        : findings.filter(f => (f.severity || '').toLowerCase() === findingsFilter);

      // Sort: severity rank then effort desc
      const sevRank = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
      filtered.sort((a, b) => {
        const ra = sevRank[a.severity] ?? 99;
        const rb = sevRank[b.severity] ?? 99;
        if (ra !== rb) return ra - rb;
        return (b.effortHours || 0) - (a.effortHours || 0);
      });

      const totalHrs = filtered.reduce((s, f) => s + (f.effortHours || 0), 0);
      const filterPill = (key, label, count, sevClass) => `
        <button class="filter-chip ${findingsFilter === key ? 'active ' + sevClass : ''}"
                onclick="setFindingsFilter('${key}')">
          ${label}${count != null ? ` · ${count}` : ''}
        </button>
      `;

      // Stash the current findings + report context on window for the Jira modal to pick up.
      // Diff banner already computed above; we expose diff data via the same channel.
      window.__currentFindings = filtered;
      window.__currentReport = report;
      window.__currentDiff = diff;

      const hasDiff = !!(diff && diff.statusMap);
      const newCount = hasDiff ? Object.values(diff.statusMap).filter(s => s === 'new').length : 0;

      const toolbar = `
        <div class="findings-toolbar">
          <span class="findings-toolbar-label">Filter:</span>
          ${filterPill('all',      'All',                  findings.length, '')}
          ${filterPill('critical', 'Critical', sev.critical, 'sev-critical-active')}
          ${filterPill('high',     'High',     sev.high,     'sev-high-active')}
          ${filterPill('medium',   'Medium',   sev.medium,   'sev-medium-active')}
          ${filterPill('low',      'Low',      sev.low,      'sev-low-active')}
          <div class="jira-cluster">
            <button class="jira-btn primary" onclick="openJiraExportModal('epic-stories')"
              title="Export an Epic plus all visible findings as Stories/Bugs under it. Jira CSV importer ready.">
              <span class="icon"></span>Export Epic + Stories
            </button>
            <button class="jira-btn" onclick="openJiraExportModal('stories-only')"
              title="Export findings as standalone Stories/Bugs. Attach to an existing Epic in Jira after import.">
              <span class="icon"></span>Export Stories Only
            </button>
            ${hasDiff && newCount > 0 ? `
              <button class="jira-btn" onclick="openJiraExportModal('diff-new')"
                title="Export only findings that are NEW since the previous scan of this project.">
                <span class="icon"></span>Export New Only
                <span class="diff-export-hint">${newCount}</span>
              </button>
            ` : ''}
          </div>
        </div>
      `;

      // Diff banner — only shown when a prior scan exists.
      const diffBanner = diff ? (() => {
        const newCount = Object.values(diff.statusMap).filter(s => s === 'new').length;
        const openCount = Object.values(diff.statusMap).filter(s => s === 'open').length;
        const fixedCount = diff.fixed.length;
        return `
          <div class="diff-banner">
            <div class="diff-stat"><span class="num new">${newCount}</span><span class="lbl">New</span></div>
            <div class="diff-stat"><span class="num open">${openCount}</span><span class="lbl">Open</span></div>
            <div class="diff-stat"><span class="num fixed">${fixedCount}</span><span class="lbl">Fixed</span></div>
            <div class="diff-context">vs. scan from ${formatDate(diff.priorReport.generatedIso)}</div>
          </div>
        `;
      })() : '';

      const totalsBar = `
        <div class="totals-bar">
          <div class="totals-stat">
            <div class="lbl">Findings</div>
            <div class="val">${filtered.length}<small>of ${findings.length}</small></div>
          </div>
          <div class="totals-stat">
            <div class="lbl">Effort</div>
            <div class="val">${totalHrs > 0 ? totalHrs.toFixed(1) + '<small>hours</small>' : '<span style="color: var(--text-tertiary); font-size: 16px;">not estimated</span>'}</div>
          </div>
          ${totals.totalCost ? `
          <div class="totals-stat">
            <div class="lbl">Est. Cost</div>
            <div class="val">$${Number(totals.totalCost).toLocaleString()}</div>
          </div>` : ''}
          <div class="totals-stat">
            <div class="lbl">Scan Date</div>
            <div class="val" style="font-size: 13px; padding-top: 4px;">${formatDate(report.generatedIso)}</div>
          </div>
        </div>
      `;

      const cardsHtml = filtered.length === 0
        ? '<div class="findings-empty">No findings match the current filter.</div>'
        : filtered.map(f => {
            const sevKey = (f.severity || '').toLowerCase();
            const sevClass = `f-${sevKey}`;
            const sevChip = `<span class="sev-chip sev-${sevKey}"><span class="dot"></span>${escapeHtml(f.severity || '—')}</span>`;
            const filesHtml = (f.files || []).slice(0, 4).map(file =>
              `<span class="finding-file">${escapeHtml(file)}</span>`
            ).join(' ');
            const overflow = (f.files || []).length > 4 ? ` <span class="finding-meta">+${f.files.length - 4} more</span>` : '';
            const allFilesHtml = (f.files || []).map(file =>
              `<span class="finding-file">${escapeHtml(file)}</span>`
            ).join(' ');
            const effortLabel = f.effortHours
              ? `<span><b>Effort:</b> ${f.effortHours}h</span>` : '';
            const confidenceLabel = (f.confidence != null)
              ? `<span><b>Confidence:</b> ${f.confidence}%</span>` : '';

            // Status pill (Open/New) from cross-scan diff
            const status = diff?.statusMap?.[f.id];
            const statusPill = status === 'new'
              ? '<span class="status-pill status-new">● New</span>'
              : status === 'open'
                ? '<span class="status-pill status-open">Open</span>'
                : '';

            // Per-finding Export link. Label switches based on severity.
            const exportLabel = (sevKey === 'critical' || sevKey === 'high') ? 'Export as Bug' : 'Export as Story';
            const exportLink = `<button class="finding-export-link" onclick="event.stopPropagation();exportSingleFinding('${escapeAttr(f.id)}')" title="Export this finding as a single-row Jira CSV ready to import.">${exportLabel}</button>`;

            return `
              <div class="finding-card expandable ${sevClass}" data-finding-id="${escapeAttr(f.id || '')}" onclick="toggleFindingExpand(this, event)">
                ${exportLink}
                <div class="finding-card-top">
                  <div class="finding-title">${escapeHtml(f.title || '(untitled)')}${statusPill}</div>
                  ${sevChip}
                  <span class="finding-chevron">▶</span>
                </div>
                ${f.detail ? `<div class="finding-detail">${escapeHtml(f.detail)}</div>` : ''}
                <div class="finding-meta">
                  ${filesHtml}${overflow}
                  ${effortLabel}
                  ${confidenceLabel}
                </div>
                <div class="finding-expand">
                  <div class="finding-expand-inner">
                    ${(f.files || []).length > 4 ? `<div class="finding-expand-label">All Affected Files (${f.files.length})</div><div class="finding-files-full">${allFilesHtml}</div>` : ''}
                    <div class="remediation-placeholder">
                      <div class="rp-title">Remediation Prompt</div>
                      <div class="rp-body">Generating detailed remediation prompts. Check back after your next Ghost Watcher™ scan.</div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('');

      // Fixed findings section — only when diff is available and there are any.
      const fixedHtml = (diff && diff.fixed.length > 0) ? (() => {
        const cards = diff.fixed.map(f => {
          const sevKey = (f.severity || '').toLowerCase();
          return `
            <div class="finding-card f-${sevKey}" style="opacity: 0.65;">
              <div class="finding-card-top">
                <div class="finding-title" style="text-decoration: line-through; color: var(--text-tertiary);">
                  ${escapeHtml(f.title || '(untitled)')}
                  <span class="status-pill status-fixed">✓ Fixed</span>
                </div>
                <span class="sev-chip sev-${sevKey}"><span class="dot"></span>${escapeHtml(f.severity || '—')}</span>
              </div>
              <div class="finding-meta">
                ${(f.files || []).slice(0, 3).map(file => `<span class="finding-file">${escapeHtml(file)}</span>`).join(' ')}
              </div>
            </div>
          `;
        }).join('');
        return `
          <div class="section-label" style="margin-top: 22px;">Fixed since last scan</div>
          <div class="findings-list">${cards}</div>
        `;
      })() : '';

      container.innerHTML = diffBanner + toolbar + totalsBar + `<div class="findings-list">${cardsHtml}</div>` + fixedHtml;
    }

    async function renderReportBodyInto(container, report) {
      container.innerHTML = '<div class="report-detail" id="report-body"><div class="loading">Loading report…</div></div>';

      // Fetch body. Prefer .md, fall back to .txt for older reports.
      let body;
      let isPlainText = false;
      if (reportBodyCache[report.id]) {
        body = reportBodyCache[report.id].body;
        isPlainText = reportBodyCache[report.id].isPlainText;
      } else {
        const bodyFile = report.files.md || report.files.txt;
        if (!bodyFile) {
          document.getElementById('report-body').innerHTML =
            `<div class="error">No body available for this report.</div>`;
          return;
        }
        isPlainText = !report.files.md && !!report.files.txt;
        try {
          const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(bodyFile)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`report ${res.status}`);
          body = await res.text();
          reportBodyCache[report.id] = { body, isPlainText };
        } catch (err) {
          document.getElementById('report-body').innerHTML =
            `<div class="error">Failed to load report: ${escapeHtml(err.message)}</div>`;
          return;
        }
      }

      const html = isPlainText
        ? `<pre style="white-space: pre-wrap; font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 12px; background: transparent; border: none; padding: 0;">${escapeHtml(body)}</pre>`
        : mdToHtml(body);
      document.getElementById('report-body').innerHTML = html;
    }

    // ── Mode info modal ──────────────────────────────────
    function showModeModal(modeKey) {
      const desc = MODE_DESCRIPTIONS[modeKey];
      if (!desc) return;
      const existing = document.getElementById('mode-modal-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'mode-modal-overlay';
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
          <button class="modal-close" aria-label="Close" onclick="closeModeModal()">×</button>
          <div class="modal-mode">Scan Mode</div>
          <div class="modal-title" id="modal-title">${escapeHtml(desc.title)}</div>
          <div class="modal-body">${escapeHtml(desc.body)}</div>
        </div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModeModal();
      });
      document.body.appendChild(overlay);
      document.addEventListener('keydown', escClose);
    }
    function closeModeModal() {
      const overlay = document.getElementById('mode-modal-overlay');
      if (overlay) overlay.remove();
      document.removeEventListener('keydown', escClose);
    }
    function escClose(e) {
      if (e.key === 'Escape') closeModeModal();
    }

    // ── CSV export for current mode ────────────────────────────────
    function exportCurrentModeCsv() {
      if (!currentMode || !manifest) return;
      const reports = manifest.reports.filter(r => r.mode === currentMode);
      const modeInfo = manifest.modeSummary[currentMode];

      const headers = ['Project', 'Generated', 'Tool', 'Files Analyzed', 'Summary', 'MD', 'PDF', 'TXT'];
      const rows = reports.map(r => [
        r.project,
        r.generated,
        r.tool,
        r.filesAnalyzed || '',
        (r.summary || '').replace(/\s+/g, ' ').trim(),
        r.files.md  ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.md)}`  : '',
        r.files.pdf ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.pdf)}` : '',
        r.files.txt ? `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(r.files.txt)}` : '',
      ]);

      // Escape CSV: double-quote fields, escape internal quotes by doubling them.
      const escape = (v) => {
        const s = String(v == null ? '' : v);
        return `"${s.replace(/"/g, '""')}"`;
      };
      const lines = [
        headers.map(escape).join(','),
        ...rows.map(row => row.map(escape).join(',')),
      ];
      // Excel-friendly: prepend BOM so UTF-8 is detected correctly.
      const csv = '\uFEFF' + lines.join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${PORTAL_SLUG}-${currentMode}-reports-${today}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Markdown → HTML (lightweight, no external lib) ───────────────
    function mdToHtml(md) {
      // Tables (basic 2-column GFM table)
      md = md.replace(/((?:\|[^\n]+\|\n)+)/g, (m) => {
        const rows = m.trim().split('\n').map(r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim()));
        if (rows.length < 2) return m;
        // Skip alignment row if present
        const alignmentRow = rows[1] && rows[1].every(c => /^:?-+:?$/.test(c));
        const header = rows[0];
        const dataRows = alignmentRow ? rows.slice(2) : rows.slice(1);
        const thead = `<thead><tr>${header.map(h => `<th>${inlineMd(h)}</th>`).join('')}</tr></thead>`;
        const tbody = `<tbody>${dataRows.map(r => `<tr>${r.map(c => `<td>${inlineMd(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
        return `<table>${thead}${tbody}</table>`;
      });
      // Code fences
      md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      // Headings
      md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // HR
      md = md.replace(/^---+$/gm, '<hr>');
      // Blockquote
      md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // Lists
      md = md.replace(/(?:^[-*] .+\n?)+/gm, (block) => {
        const items = block.trim().split('\n').map(l => l.replace(/^[-*] /, '').trim()).filter(Boolean);
        return `<ul>${items.map(i => `<li>${inlineMd(i)}</li>`).join('')}</ul>`;
      });
      md = md.replace(/(?:^\d+\. .+\n?)+/gm, (block) => {
        const items = block.trim().split('\n').map(l => l.replace(/^\d+\. /, '').trim()).filter(Boolean);
        return `<ol>${items.map(i => `<li>${inlineMd(i)}</li>`).join('')}</ol>`;
      });
      // Paragraphs (any line that's not already a block element)
      md = md.split(/\n\n+/).map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';
        if (/^<(h\d|table|pre|ul|ol|hr|blockquote)/.test(trimmed)) return trimmed;
        return `<p>${inlineMd(trimmed.replace(/\n/g, ' '))}</p>`;
      }).join('\n');
      return md;
    }

    function inlineMd(s) {
      // Inline code
      s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
      // Bold
