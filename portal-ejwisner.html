<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#0a1528">
  <title>Ghost Portal — ejwisner</title>
  <style>
    :root {
      --bg-page: #050a14;
      --bg-card: rgba(10, 21, 40, 0.94);
      --bg-card-top: rgba(18, 36, 64, 0.97);
      --bg-tile: rgba(15, 28, 50, 0.85);
      --bg-tile-hover: rgba(20, 38, 65, 0.95);
      --border: rgba(0, 191, 216, 0.28);
      --border-strong: rgba(0, 191, 216, 0.55);
      --cyan: #00bfd8;
      --cyan-bright: #00e5ff;
      --cyan-dim: #4d8a99;
      --navy: #0a2540;
      --text-primary: #f5f9ff;
      --text-secondary: #b8c5d6;
      --text-tertiary: #8a9aaf;
      --good: #00e5a8;
      --warn: #ffc266;
      --bad: #ff7a7a;
      --grid: rgba(0, 191, 216, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100%; background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
              env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 20px 18px 40px; }

    .card {
      background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none; opacity: 0.5;
    }

    .titlebar {
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border); background: rgba(8,14,26,0.4);
      position: relative; z-index: 2;
    }
    .brand { display: flex; align-items: center; gap: 12px; letter-spacing: 0.18em; font-size: 12px; font-weight: 700; }
    .brand-mark {
      width: 9px; height: 9px; border-radius: 2px; background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan); animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .brand-text {
      background: linear-gradient(90deg, var(--cyan-bright), var(--cyan));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .portal-tag { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; }

    .body { padding: 24px 22px 22px; position: relative; z-index: 1; }

    /* HERO */
    .hero { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid var(--border); gap: 16px; margin-bottom: 22px; }
    .hero-label { font-size: 11px; letter-spacing: 0.2em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    .hero-value { font-size: 56px; font-weight: 200; line-height: 1; color: var(--text-primary); }
    .hero-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
    .hero-right { text-align: right; }
    .hero-right .delta { font-size: 14px; color: var(--good); font-weight: 500; }
    .hero-right .delta-sub { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; margin-top: 2px; }

    /* LEVEL 0: TILE GRID */
    .section-label { font-size: 11px; letter-spacing: 0.2em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 14px; }
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
    .tile {
      background: var(--bg-tile);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .tile:hover {
      background: var(--bg-tile-hover);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .tile.empty {
      cursor: default; opacity: 0.5;
    }
    .tile.empty:hover {
      background: var(--bg-tile); border-color: var(--border); transform: none;
    }
    .tile-mode {
      font-size: 11px; letter-spacing: 0.16em; color: var(--cyan); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .tile-count { font-size: 38px; font-weight: 200; line-height: 1; }
    .tile-count-unit { font-size: 12px; color: var(--text-tertiary); margin-left: 4px; }
    .tile-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 12px; }
    .tile-arrow {
      position: absolute; top: 18px; right: 18px;
      color: var(--cyan-dim); font-size: 16px;
      transition: color 0.15s, transform 0.15s;
    }
    .tile:hover .tile-arrow { color: var(--cyan); transform: translate(2px, -2px); }

    .info-icon {
      position: absolute; top: 16px; left: 16px;
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(8, 14, 26, 0.6);
      color: var(--text-tertiary);
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: help;
      transition: all 0.15s;
      font-family: 'Times New Roman', serif;
      font-style: italic;
      line-height: 1;
    }
    .info-icon:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 191, 216, 0.1); }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(2, 6, 14, 0.78);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      overscroll-behavior: contain;
      animation: fadeIn 0.15s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      max-width: 500px; width: 100%;
      padding: 26px 28px 22px;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: absolute; top: 12px; right: 14px;
      width: 28px; height: 28px;
      background: transparent; border: none;
      color: var(--text-tertiary); font-size: 20px;
      cursor: pointer; transition: color 0.15s;
      line-height: 1; padding: 0;
    }
    .modal-close:hover { color: var(--cyan); }
    .modal-mode {
      font-size: 11px; letter-spacing: 0.18em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .modal-title {
      font-size: 22px; font-weight: 300; color: var(--text-primary);
      margin-bottom: 14px; line-height: 1.2;
    }
    .modal-body {
      font-size: 14px; line-height: 1.65; color: var(--text-secondary);
    }

    /* LEVEL 1: MODE DASHBOARD */
    .back-bar {
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .export-btn { margin-left: auto; }
    .back-btn {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; font-size: 12px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.1em;
    }
    .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .breadcrumb { font-size: 12px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
    .breadcrumb b { color: var(--text-primary); font-weight: 500; }

    .mode-stats { display: flex; gap: 24px; margin-bottom: 22px; flex-wrap: wrap; }
    .mode-stat { padding-right: 24px; border-right: 1px solid var(--border); }
    .mode-stat:last-child { border-right: none; }
    .mode-stat .label { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; }
    .mode-stat .value { font-size: 24px; font-weight: 300; color: var(--text-primary); }

    .report-list { display: flex; flex-direction: column; gap: 10px; }
    .report-row {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative;
    }
    .report-row:hover { background: var(--bg-tile-hover); border-color: var(--border-strong); }
    .report-row-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .report-project { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .report-date { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.06em; white-space: nowrap; }
    .report-summary { font-size: 12px; line-height: 1.5; color: var(--text-secondary); }
    .report-meta { font-size: 10px; color: var(--text-tertiary); margin-top: 8px; letter-spacing: 0.04em; }

    /* Severity chip row */
    .severity-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .sev-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid;
    }
    .sev-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
    .sev-critical { color: #ff7a7a; border-color: rgba(255, 122, 122, 0.4); background: rgba(255, 122, 122, 0.06); }
    .sev-critical .dot { background: #ff5555; box-shadow: 0 0 6px #ff5555; }
    .sev-high { color: #ffa666; border-color: rgba(255, 166, 102, 0.4); background: rgba(255, 166, 102, 0.06); }
    .sev-high .dot { background: #ff9040; }
    .sev-medium { color: #ffc266; border-color: rgba(255, 194, 102, 0.4); background: rgba(255, 194, 102, 0.06); }
    .sev-medium .dot { background: #ffb030; }
    .sev-low { color: #79c4d4; border-color: rgba(121, 196, 212, 0.4); background: rgba(121, 196, 212, 0.06); }
    .sev-low .dot { background: #5aa8ba; }
    .sev-total {
      color: var(--text-tertiary); border-color: var(--border); background: transparent;
      margin-left: 4px;
    }
    .sev-total .dot { display: none; }

    /* History grouping */
    .history-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--cyan-dim); border: 1px solid var(--border);
      background: rgba(0, 191, 216, 0.04);
      margin-left: 8px;
    }

    /* LEVEL 2 — View tabs (Findings | Full Report) */
    .view-tabs {
      display: flex; gap: 2px; margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .view-tab {
      background: transparent; border: none;
      padding: 10px 18px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
      font-family: inherit; position: relative;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .view-tab:hover { color: var(--text-secondary); }
    .view-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .view-tab-count {
      display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 10px;
      background: rgba(0, 191, 216, 0.12); font-size: 10px; color: var(--cyan-bright);
    }
    .watch-date-filter { display: flex; gap: 6px; flex-wrap: wrap; margin: -6px 0 14px; }
    .watch-date-pill {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 14px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-tertiary); cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .watch-date-pill:hover { color: var(--text-secondary); border-color: var(--border-strong); }
    .watch-date-pill.active { background: rgba(0,191,216,0.12); border-color: var(--cyan); color: var(--cyan-bright); }

    /* LEVEL 2 — Findings list view */
    .findings-toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .findings-toolbar-label {
      font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase;
      margin-right: 4px;
    }
    .filter-chip {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 14px; padding: 5px 12px; font-size: 11px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .filter-chip:hover { border-color: var(--cyan-dim); color: var(--text-primary); }
    .filter-chip.active { background: rgba(0, 191, 216, 0.12); border-color: var(--cyan); color: var(--cyan); }
    .filter-chip.active.sev-critical-active { background: rgba(255, 122, 122, 0.12); border-color: #ff7a7a; color: #ff7a7a; }
    .filter-chip.active.sev-high-active     { background: rgba(255, 166, 102, 0.12); border-color: #ffa666; color: #ffa666; }
    .filter-chip.active.sev-medium-active   { background: rgba(255, 194, 102, 0.12); border-color: #ffc266; color: #ffc266; }
    .filter-chip.active.sev-low-active      { background: rgba(121, 196, 212, 0.12); border-color: #79c4d4; color: #79c4d4; }

    .totals-bar {
      display: flex; gap: 22px; padding: 14px 18px; margin-bottom: 16px;
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      flex-wrap: wrap;
    }
    .totals-stat .lbl { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; }
    .totals-stat .val { font-size: 20px; font-weight: 300; color: var(--text-primary); margin-top: 2px; }
    .totals-stat .val small { font-size: 11px; color: var(--text-tertiary); margin-left: 4px; }

    .findings-list { display: flex; flex-direction: column; gap: 8px; }
    .finding-card {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; transition: all 0.15s; position: relative;
      border-left-width: 3px;
    }
    .finding-card.f-critical { border-left-color: #ff5555; }
    .finding-card.f-high     { border-left-color: #ff9040; }
    .finding-card.f-medium   { border-left-color: #ffb030; }
    .finding-card.f-low      { border-left-color: #5aa8ba; }
    .finding-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      margin-bottom: 8px;
    }
    .finding-title { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; }
    .finding-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 8px; }
    .finding-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em;
    }
    .finding-meta b { color: var(--text-secondary); font-weight: 500; }
    .finding-file {
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 10px;
      color: var(--cyan-dim); background: rgba(0, 191, 216, 0.06);
      padding: 1px 6px; border-radius: 3px;
    }
    .findings-empty {
      padding: 32px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
      background: var(--bg-tile); border: 1px dashed var(--border); border-radius: 10px;
    }

    /* ── Click-to-expand finding cards ─────────────────────────────── */
    .finding-card.expandable { cursor: pointer; }
    .finding-card.expandable:hover { border-color: var(--border-strong); background: var(--bg-tile-hover); }
    .finding-chevron {
      flex-shrink: 0; align-self: center; margin-left: 2px;
      color: var(--cyan-dim); font-size: 11px;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .finding-card.expanded .finding-chevron { transform: rotate(90deg); color: var(--cyan); }
    .finding-expand {
      max-height: 0; overflow: hidden; opacity: 0; margin-top: 0;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }
    .finding-card.expanded .finding-expand { max-height: 1500px; opacity: 1; margin-top: 10px; }
    .finding-expand-inner { border-top: 1px solid var(--border); padding-top: 12px; }
    .finding-expand-label {
      font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .finding-files-full { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }

    /* Remediation Prompt placeholder - uses the Ghost Brief™ orange theme */
    .remediation-placeholder {
      background: var(--brief-bg); border: 1px dashed rgba(224,115,64,0.4);
      border-radius: 8px; padding: 12px 14px;
    }
    .remediation-placeholder .rp-title {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brief); font-weight: 600; margin-bottom: 6px;
    }
    .remediation-placeholder .rp-body { font-size: 12px; color: var(--text-tertiary); line-height: 1.55; }

    /* Status pills on findings (Open / New / Fixed across scans) */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 4px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid;
      margin-left: 8px;
    }
    .status-new   { color: #00e5a8; border-color: rgba(0, 229, 168, 0.4); background: rgba(0, 229, 168, 0.08); }
    .status-open  { color: var(--text-tertiary); border-color: var(--border); background: transparent; }
    .status-fixed { color: var(--cyan); border-color: rgba(0, 191, 216, 0.4); background: rgba(0, 191, 216, 0.08); }

    /* Cross-scan summary banner above the findings list */
    .diff-banner {
      display: flex; gap: 18px; padding: 12px 16px;
      background: rgba(0, 191, 216, 0.04); border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 8px; margin-bottom: 14px;
      font-size: 12px; flex-wrap: wrap;
    }
    .diff-stat { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
    .diff-stat .num { font-size: 16px; font-weight: 500; color: var(--text-primary); }
    .diff-stat .num.new   { color: #00e5a8; }
    .diff-stat .num.fixed { color: var(--cyan); }
    .diff-stat .num.open  { color: var(--text-primary); }
    .diff-stat .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); }
    .diff-context { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; align-self: center; }

    /* LEVEL 2: REPORT DETAIL */
    .report-detail {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 24px 26px; line-height: 1.6;
    }
    .report-detail h1 { font-size: 22px; font-weight: 500; margin-bottom: 16px; color: var(--text-primary); }
    .report-detail h2 { font-size: 17px; font-weight: 500; margin-top: 24px; margin-bottom: 10px; color: var(--cyan); }
    .report-detail h3 { font-size: 14px; font-weight: 500; margin-top: 18px; margin-bottom: 8px; color: var(--text-primary); }
    .report-detail p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
    .report-detail ul, .report-detail ol { margin-left: 22px; margin-bottom: 12px; }
    .report-detail li { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .report-detail code {
      background: rgba(0, 191, 216, 0.1); padding: 2px 6px; border-radius: 4px;
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 12px; color: var(--cyan-bright);
    }
    .report-detail pre {
      background: rgba(0,0,0,0.35); padding: 14px 16px; border-radius: 8px; overflow-x: auto;
      margin-bottom: 14px; border: 1px solid var(--border);
    }
    .report-detail pre code { background: transparent; padding: 0; color: var(--text-secondary); }
    .report-detail table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 12px; }
    .report-detail th, .report-detail td {
      border: 1px solid var(--border); padding: 8px 12px; text-align: left; color: var(--text-secondary);
    }
    .report-detail th { background: rgba(0,191,216,0.08); color: var(--cyan); font-weight: 500; }
    .report-detail strong { color: var(--text-primary); font-weight: 600; }
    .report-detail hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .report-detail blockquote {
      border-left: 3px solid var(--cyan); padding-left: 14px; margin-bottom: 12px; color: var(--text-tertiary);
    }

    .download-bar {
      display: flex; gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .download-bar-top {
      margin-top: 0; padding-top: 0; padding-bottom: 18px; margin-bottom: 18px;
      border-top: none; border-bottom: 1px solid var(--border);
    }
    .download-btn {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: 11px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .download-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .loading, .error, .empty-state {
      padding: 40px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
    }
    .error { color: var(--bad); }

    .footer {
      max-width: 1100px; margin: 18px auto 0; padding: 0 18px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .footer .left { display: flex; align-items: center; gap: 8px; }
    .footer .mark {
      width: 6px; height: 6px; border-radius: 1px; background: var(--cyan-dim);
    }
    .footer a { color: var(--text-tertiary); text-decoration: none; transition: color 0.15s; }
    .footer a:hover { color: var(--cyan); }
    @media (max-width: 520px) {
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }

    /* ── JIRA EXPORT ──────────────────────────────────────────────── */

    /* Jira button cluster on the findings toolbar */
    .jira-cluster {
      display: inline-flex; gap: 6px; align-items: center;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .jira-btn {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; font-size: 11px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.08em;
      text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .jira-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .jira-btn.primary {
      background: rgba(0, 191, 216, 0.10);
      border-color: var(--cyan);
      color: var(--cyan-bright);
    }
    .jira-btn.primary:hover {
      background: rgba(0, 191, 216, 0.18);
      box-shadow: 0 0 12px rgba(0, 191, 216, 0.25);
    }
    .jira-btn .icon {
      width: 11px; height: 11px;
      display: inline-block;
      background: currentColor;
      mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3 11 L3 14 L13 14 L13 11 M8 3 L8 11 M5 7 L8 4 L11 7'/></svg>");
      mask-size: contain; mask-repeat: no-repeat; mask-position: center;
      -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3 11 L3 14 L13 14 L13 11 M8 3 L8 11 M5 7 L8 4 L11 7'/></svg>");
      -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
    }

    /* Per-finding "Export as Story" link */
    .finding-export-link {
      position: absolute; top: 12px; right: 14px;
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; font-size: 9px; color: var(--text-tertiary);
      cursor: pointer; transition: all 0.15s; font-family: inherit;
      letter-spacing: 0.1em; text-transform: uppercase;
      opacity: 0; pointer-events: none;
    }
    .finding-card { position: relative; }
    .finding-card:hover .finding-export-link { opacity: 1; pointer-events: auto; }
    .finding-export-link:hover { color: var(--cyan); border-color: var(--cyan); }
    .finding-card-top { padding-right: 110px; }

    /* Pre-export modal (extends existing .modal styles) */
    .jira-modal {
      max-width: 620px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
    }
    .jira-modal .jira-modal-scroll {
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      flex: 1 1 auto;
      padding-right: 4px;
      margin-right: -4px;
    }
    .jira-modal .jira-modal-scroll::-webkit-scrollbar { width: 8px; }
    .jira-modal .jira-modal-scroll::-webkit-scrollbar-track { background: transparent; }
    .jira-modal .jira-modal-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .jira-modal .jira-modal-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    .jira-modal .form-row { margin-bottom: 14px; }
    .jira-modal label {
      display: block; font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .jira-modal input[type="text"],
    .jira-modal textarea,
    .jira-modal select {
      width: 100%; background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--text-primary);
      font-family: inherit;
    }
    .jira-modal input[type="text"]:focus,
    .jira-modal textarea:focus,
    .jira-modal select:focus {
      outline: none; border-color: var(--cyan);
    }
    .jira-modal .form-row-inline { display: flex; gap: 10px; }
    .jira-modal .form-row-inline > div { flex: 1; }
    .jira-modal .help { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; line-height: 1.5; }
    .jira-modal .preview-counts {
      background: rgba(0, 191, 216, 0.06);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin: 14px 0;
      font-size: 12px; color: var(--text-secondary);
    }
    .jira-modal .preview-counts strong { color: var(--cyan-bright); }
    .jira-modal .preview-mapping {
      background: rgba(0,0,0,0.25); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; margin: 10px 0;
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 10px; color: var(--text-tertiary);
      max-height: 140px; overflow-y: auto;
    }
    .jira-modal .toggle-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .jira-modal .toggle-row input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: var(--cyan); cursor: pointer;
    }
    .jira-modal .toggle-row label {
      margin: 0; font-size: 11px; color: var(--text-secondary);
      letter-spacing: 0.04em; text-transform: none; cursor: pointer;
    }
    .jira-modal .action-row {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 0; padding: 14px 0 18px 0;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
      flex-shrink: 0;
    }
    .jira-modal .btn-action {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 11px;
      color: var(--text-secondary); cursor: pointer; font-family: inherit;
      letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s;
    }
    .jira-modal .btn-action:hover { border-color: var(--cyan); color: var(--cyan); }
    .jira-modal .btn-action.primary {
      background: var(--cyan); border-color: var(--cyan); color: var(--navy);
      font-weight: 600;
    }
    .jira-modal .btn-action.primary:hover {
      background: var(--cyan-bright); border-color: var(--cyan-bright);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
    }
    .jira-modal .format-tabs {
      display: flex; gap: 0; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .jira-modal .format-tab {
      background: transparent; border: none; padding: 8px 14px;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
      font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .jira-modal .format-tab:hover { color: var(--text-secondary); }
    .jira-modal .format-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    /* Multi-scan selector at Level 1 */
    .multi-select-bar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: rgba(0, 191, 216, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    .multi-select-bar.active { display: flex; }
    .multi-select-bar .ms-label {
      font-size: 10px; letter-spacing: 0.16em; color: var(--cyan);
      text-transform: uppercase; font-weight: 600;
    }
    .multi-select-bar .ms-count {
      font-size: 11px; color: var(--text-secondary);
    }
    .report-row.selectable { padding-left: 44px; }
    .report-row .ms-check {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; accent-color: var(--cyan); cursor: pointer;
    }

    /* Success toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--bg-card-top); border: 1px solid var(--cyan);
      border-radius: 10px; padding: 12px 20px;
      color: var(--text-primary); font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 20px rgba(0, 191, 216, 0.2);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s, transform 0.25s ease-out;
      display: flex; align-items: center; gap: 10px;
      max-width: 90vw;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    .toast .toast-icon {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--good);
      display: flex; align-items: center; justify-content: center;
      color: var(--navy); font-size: 11px; font-weight: 800;
      flex-shrink: 0;
    }
    .toast .toast-text { line-height: 1.4; }
    .toast .toast-text small { color: var(--text-tertiary); display: block; margin-top: 2px; font-size: 11px; }

    /* Diff-export hint */
    .diff-export-hint {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--good); letter-spacing: 0.06em;
      margin-left: 4px;
    }

    @media (max-width: 640px) {
      .jira-cluster { width: 100%; margin-left: 0; margin-top: 8px; }
      .jira-btn { font-size: 10px; padding: 5px 9px; }
      .finding-card-top { padding-right: 0; }
      .finding-export-link { position: static; opacity: 1; pointer-events: auto; margin-top: 6px; display: inline-block; }
    }

    /* ── GHOST BRIEF ─────────────────────────────────────────────── */
    :root { --brief: #e07340; --brief-dim: #a04e28; --brief-bg: rgba(224, 115, 64, 0.07); }

    .tile-brief {
      border-color: rgba(224, 115, 64, 0.45);
    }
    .tile-brief:hover {
      border-color: var(--brief);
      background: rgba(224, 115, 64, 0.09);
    }
    .tile-brief .tile-mode { color: var(--brief); }
    .tile-brief .tile-arrow { color: var(--brief-dim); }
    .tile-brief:hover .tile-arrow { color: var(--brief); }

    /* Brief panel top-level view */
    .brief-panel { }

    /* Brief tab bar reuses .view-tabs / .view-tab with orange active */
    .brief-tabs .view-tab.active {
      color: var(--brief);
      border-bottom-color: var(--brief);
    }
    .brief-tabs .view-tab-count {
      background: rgba(224, 115, 64, 0.14);
      color: var(--brief);
    }

    /* Summary / source info cards */
    .brief-card {
      background: var(--bg-tile);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .brief-context-banner {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      background: rgba(224, 115, 64, 0.08);
      border: 1px solid rgba(224, 115, 64, 0.25);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .brief-context-icon {
      font-size: 1.5rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .brief-context-headline {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary, #e8eaf0);
      margin-bottom: 0.35rem;
    }
    .brief-context-sub {
      font-size: 0.82rem;
      color: var(--text-secondary, #8b9bb4);
      line-height: 1.5;
    }
    .brief-context-sub strong { color: #e07340; }
    .brief-card-title {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--brief); margin-bottom: 14px; font-weight: 600;
    }
    .brief-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
    }
    .brief-stat .lbl {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: 4px;
    }
    .brief-stat .val {
      font-size: 22px; font-weight: 300; color: var(--text-primary);
    }
    .brief-stat .val small { font-size: 11px; color: var(--text-tertiary); margin-left: 3px; }
    .brief-sev-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .brief-blast-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

    .blast-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid;
    }
    .blast-surgical { color: #00e5a8; border-color: rgba(0,229,168,0.4); background: rgba(0,229,168,0.06); }
    .blast-moderate { color: #ffc266; border-color: rgba(255,194,102,0.4); background: rgba(255,194,102,0.06); }
    .blast-broad    { color: #ff7a7a; border-color: rgba(255,122,122,0.4); background: rgba(255,122,122,0.06); }

    .brief-source-row {
      display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px;
      color: var(--text-secondary); line-height: 1.7;
    }
    .brief-source-row b { color: var(--text-primary); font-weight: 500; }
    .brief-source-kv { width: 100%; }

    /* Download button — orange tint */
    .brief-dl-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--brief-bg); border: 1px solid var(--brief);
      border-radius: 8px; padding: 9px 18px; font-size: 12px;
      color: var(--brief); cursor: pointer; transition: all 0.15s;
      font-family: inherit; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; margin-top: 8px;
    }
    .brief-dl-btn:hover {
      background: rgba(224,115,64,0.14);
      box-shadow: 0 0 12px rgba(224,115,64,0.3);
    }

    /* Prompt cards */
    .brief-prompt-list { display: flex; flex-direction: column; gap: 10px; }
    .brief-prompt-card {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      border-left: 3px solid var(--border);
      transition: border-color 0.15s;
    }
    .brief-prompt-card.f-critical { border-left-color: #ff5555; }
    .brief-prompt-card.f-high     { border-left-color: #ff9040; }
    .brief-prompt-card.f-medium   { border-left-color: #ffb030; }
    .brief-prompt-card.f-low      { border-left-color: #5aa8ba; }
    .brief-prompt-top {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .gb-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      background: rgba(224,115,64,0.14); color: var(--brief);
      border: 1px solid rgba(224,115,64,0.4); flex-shrink: 0;
      font-family: 'SF Mono', Menlo, Monaco, monospace;
    }
    .brief-prompt-title {
      font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1;
    }
    .brief-prompt-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .brief-files {
      font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px;
    }
    .brief-file-chip {
      display: inline-block;
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 10px;
      color: var(--cyan-dim); background: rgba(0,191,216,0.06);
      padding: 1px 6px; border-radius: 3px; margin: 2px 3px 2px 0;
    }
    .brief-collapsible {
      margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px;
    }
    .brief-collapse-toggle {
      background: none; border: none; font-size: 11px; color: var(--text-tertiary);
      cursor: pointer; font-family: inherit; letter-spacing: 0.1em; padding: 0;
      text-transform: uppercase; transition: color 0.15s; display: flex; align-items: center; gap: 5px;
    }
    .brief-collapse-toggle:hover { color: var(--brief); }
    .brief-collapse-body {
      display: none; margin-top: 8px; font-size: 12px; color: var(--text-secondary);
      line-height: 1.6; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px 12px;
      font-family: 'SF Mono', Menlo, Monaco, monospace; white-space: pre-wrap; word-break: break-word;
    }
    .brief-collapse-body.open { display: block; }
    .brief-hints-body {
      font-family: inherit; white-space: normal;
    }
    .brief-copy-btn {
      float: right;
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 10px; color: var(--text-tertiary);
      cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.1em;
    }
    .brief-copy-btn:hover { border-color: var(--brief); color: var(--brief); }
    .brief-tag-pill {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 10px; color: var(--text-tertiary); border: 1px solid var(--border);
      background: transparent; margin: 2px 3px 2px 0;
    }

    /* Regenerate tab */
    .brief-regen-card {
      background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 22px; margin-bottom: 14px;
    }
    .brief-cmd-block {
      background: rgba(0,0,0,0.35); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; margin: 12px 0;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .brief-cmd-text {
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 13px; color: var(--cyan-bright);
    }
    .brief-history-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-tile); margin-bottom: 8px;
      font-size: 12px; color: var(--text-secondary);
    }
    .brief-history-row a {
      color: var(--brief); text-decoration: none; font-size: 11px;
      letter-spacing: 0.08em;
    }
    .brief-history-row a:hover { text-decoration: underline; }
    .brief-no-data {
      padding: 32px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
      background: var(--bg-tile); border: 1px dashed rgba(224,115,64,0.35); border-radius: 10px;
    }

    /* ── Ghost Watcher™ — Watch panel ───────────────────────────────── */
    .watch-list { display: flex; flex-direction: column; gap: 10px; }
    .watch-row {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative;
      border-left: 3px solid var(--border);
    }
    .watch-row:hover { background: var(--bg-tile-hover); border-color: var(--border-strong); }
    .watch-row.has-critical { border-left-color: #ff5555; }
    .watch-row.has-high     { border-left-color: #ff9040; }
    .watch-row.has-medium   { border-left-color: #ffb030; }
    .watch-row.has-low      { border-left-color: #5aa8ba; }
    .watch-row.is-clean     { border-left-color: var(--good); }
    .watch-row.is-pending   { border-left-color: var(--cyan); }
    .watch-row.is-cancelled { border-left-color: #555; }
    .watch-row-top {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .watch-row-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; }
    .watch-row-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .watch-hash {
      font-family: 'SF Mono', Menlo, Monaco, monospace; font-size: 12px; font-weight: 700;
      color: var(--cyan-bright); background: rgba(0,191,216,0.08);
      padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em; flex-shrink: 0;
    }
    .watch-branch {
      font-size: 11px; color: var(--text-secondary);
      font-family: 'SF Mono', Menlo, Monaco, monospace;
    }
    .watch-dev { font-size: 12px; color: var(--text-primary); font-weight: 500; }
    .watch-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; letter-spacing: 0.06em; }
    .watch-caret { color: var(--text-tertiary); font-size: 11px; transition: transform 0.15s; margin-left: 2px; }
    .watch-row.expanded .watch-caret { transform: rotate(90deg); }
    .watch-clean-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--good); border: 1px solid rgba(0,229,168,0.4); background: rgba(0,229,168,0.06);
    }
    .watch-pending-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--cyan-bright); border: 1px solid var(--border-strong); background: rgba(0,191,216,0.08);
      animation: watchPulse 1.6s ease-in-out infinite;
    }
    @keyframes watchPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .watch-drawer { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .watch-row.expanded .watch-drawer { display: block; }
    .watch-finding {
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: rgba(0,0,0,0.18); margin-bottom: 8px;
    }
    .watch-finding:last-child { margin-bottom: 0; }
    .watch-finding-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .watch-finding-title { font-size: 13px; font-weight: 500; color: var(--text-primary); flex: 1; min-width: 0; }
    .watch-finding-detail { font-size: 11px; line-height: 1.6; color: var(--text-secondary); word-break: break-word; }

    /* Click-to-expand watch findings inside the commit drawer */
    .watch-finding.expandable { cursor: pointer; }
    .watch-finding.expandable:hover { border-color: var(--border-strong); }
    .watch-finding-chevron {
      flex-shrink: 0; align-self: center; margin-left: auto;
      color: var(--text-tertiary); font-size: 11px;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .watch-finding.expanded .watch-finding-chevron { transform: rotate(90deg); color: var(--cyan); }
    .watch-finding-expand {
      max-height: 0; overflow: hidden; opacity: 0; margin-top: 0;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }
    .watch-finding.expanded .watch-finding-expand { max-height: 1500px; opacity: 1; margin-top: 10px; }
    .watch-finding-expand-inner { border-top: 1px solid var(--border); padding-top: 10px; }
    .watch-finding-detail-full { font-size: 12px; line-height: 1.6; color: var(--text-secondary); word-break: break-word; margin-bottom: 10px; }
    .watch-finding-copy-btn {
      margin-top: 8px; background: var(--bg-tile); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 10px; color: var(--text-tertiary);
      font-family: inherit; letter-spacing: 0.1em; opacity: 0.55; cursor: not-allowed;
    }
    .watch-finding-copy-btn:not([disabled]) {
      opacity: 1; cursor: pointer; transition: all 0.15s;
      border-color: var(--cyan); color: var(--cyan);
    }
    .watch-finding-copy-btn:not([disabled]):hover {
      background: var(--bg-tile-hover); border-color: var(--cyan-bright); color: var(--cyan-bright);
    }
    .watch-empty {
      padding: 48px 20px; text-align: center; color: var(--text-tertiary);
      background: var(--bg-tile); border: 1px dashed var(--border); border-radius: 12px;
    }
    .watch-empty .ghost-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.75; }
    .watch-empty .watch-empty-msg { font-size: 13px; line-height: 1.6; max-width: 380px; margin: 0 auto; }

    /* Ghost Watcher — Dashboard sub-tab */
    .watch-dash-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px; margin-bottom: 22px;
    }
    .watch-dash-card {
      background: var(--bg-tile); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px;
    }
    .watch-dash-card .lbl { font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary); text-transform: uppercase; }
    .watch-dash-card .val { font-size: 22px; font-weight: 300; color: var(--text-primary); margin-top: 4px; }
    .watch-dash-card .val small { font-size: 12px; color: var(--text-tertiary); margin-left: 1px; }
    .watch-dash-section { margin-bottom: 22px; }
    .watch-dash-title {
      font-size: 10px; letter-spacing: 0.16em; color: var(--text-tertiary);
      text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
    }
    .watch-dash-sevbar {
      display: flex; height: 12px; border-radius: 6px; overflow: hidden;
      background: var(--bg-tile); border: 1px solid var(--border);
    }
    .watch-dash-seg { height: 100%; }
    .watch-dash-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
    .watch-dash-legitem { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; }
    .watch-dash-legitem .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .watch-dash-sevempty { font-size: 12px; color: var(--text-tertiary); padding: 10px 0; }
    .watch-dash-trend { display: flex; gap: 8px; align-items: flex-start; }
    .watch-dash-yaxis {
      display: flex; flex-direction: column; justify-content: space-between;
      height: 120px; font-size: 10px; color: var(--text-tertiary);
    }
    .watch-dash-plotcol { flex: 1; min-width: 0; }
    .watch-dash-bars {
      display: flex; align-items: flex-end; gap: 8px; height: 120px;
      border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 0 4px;
    }
    .watch-dash-bar {
      flex: 1; max-width: 38px; min-height: 2px;
      background: var(--warn); border-radius: 3px 3px 0 0; transition: height 0.2s;
    }
    .watch-dash-xlabels { display: flex; gap: 8px; padding: 6px 4px 0; }
    .watch-dash-xlabel { flex: 1; max-width: 38px; text-align: center; font-size: 9px; color: var(--text-tertiary); white-space: nowrap; }
    .watch-dash-trendnote { font-size: 11px; color: var(--text-tertiary); padding: 8px 0 0; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="titlebar">
        <div class="brand">
          <span class="brand-mark"></span>
          <span class="brand-text">GHOST PORTAL</span>
        </div>
        <span class="portal-tag" id="portal-tag">ejwisner · sandbox</span>
      </div>
      <div class="body" id="app-root">
        <div class="loading">Loading portal data...</div>
      </div>
    </div>
  </div>
  <footer class="footer">
    <div class="left">
      <span class="mark"></span>
      <span>Powered by Ghost Architect™</span>
    </div>
    <div>
      &copy; 2026 Ghost Architect™ · <a href="https://ghostarchitect.dev" target="_blank" rel="noopener">ghostarchitect.dev</a>
    </div>
  </footer>

  <script>
    // ── Configuration ────────────────────────────────────────────────
    const PORTAL_SLUG = 'ejwisner';
    const GITHUB_REPO = 'EJWisner/ghost-architect';
    const API_BASE = 'https://signup.ghostarchitect.dev';

    // ── Mode descriptions (plain English, for non-technical readers) ──
    const MODE_DESCRIPTIONS = {
      poi: {
        title: 'Points of Interest',
        body: "A first pass through the codebase that surfaces the issues most likely to matter — security risks, fragile patterns, hidden complexity. Think of it as a doctor's intake exam: it doesn't fix anything, but it tells you where to look first.",
      },
      blast: {
        title: 'Blast Radius',
        body: 'Before you change a piece of code, this tells you what else might break. Shows the ripple effect of touching a file — what depends on it, what it depends on, and how risky the change really is.',
      },
      conflict: {
        title: 'Conflict',
        body: 'Finds places where two parts of the codebase disagree with each other — different files claiming different things, configuration that contradicts the code, rules that fight each other. These are the bugs that only surface in production.',
      },
      forecast: {
        title: 'Commit Forecast',
        body: "Before the code leaves your desk, this tells you what it might break. Ghost analyzes the proposed changes and maps the risk — what conflicts, what breaks, what ripples through the system. Think of it as a pre-flight check before every push.",
      },
      'fix-forecast-combined': {
        title: 'Fix Forecast',
        body: 'Multi-finding corrective action reports — each confirms a proposed fix is safe to apply and forecasts its blast radius before a single line of code changes.',
      },
      recon: {
        title: 'Recon',
        body: "A scouting report on a codebase you don't know yet. Maps the major systems, the riskiest files, the team patterns, and the technical debt — everything you'd want to know before bidding on the work or hiring engineers to maintain it.",
      },
      audit: {
        title: 'Inheritance Audit',
        body: 'A done-for-you report on a codebase someone else built. Designed for the buyer, not the engineer — executive summary, dead extensions, end-of-life dependencies, and what an upgrade or rebuild would actually require.',
      },
      'prompt-triage': {
        title: 'Prompt Triage',
        body: 'A defect scan for folders of LLM prompts. Surfaces structural breakage, length and token-limit issues, prompt-injection vulnerabilities, ambiguous instructions, and unbounded output. Designed for teams who ship prompts as a product surface and need an inspection layer the way code has one.',
      },
      question: {
        title: 'Question and Answer',
        body: "A single question about the codebase, with a single answer. Type your question, get a grounded answer, save the transcript if it's useful. The right shape when you have one specific thing to find out — not an open-ended exploration.",
      },
      chat: {
        title: 'Chat',
        body: "An interactive conversation with the codebase. Ask questions in plain language, get answers grounded in the actual code. Useful for due diligence or onboarding when you don't know what to look for yet.",
      },
      compare: {
        title: 'Compare',
        body: 'Side-by-side analysis of two versions of the same codebase. Shows what changed, what got better, what got worse, and where the risk moved.',
      },
      dashboard: {
        title: 'Project Dashboard',
        body: 'A live remediation rollup across every labeled project. Shows baseline vs. current finding counts, percent remediated, and what is still open. Updated automatically after every scan that touches a tracked project. The export here gives you one Jira batch containing all open findings across all projects.',
      },
      'ghost-brief': {
        title: 'Ghost Brief™',
        body: 'Ghost Brief™ converts your scan findings into a validated, blast-radius-aware prompt pack for Claude Code, Cursor, or Copilot. Each prompt tells your AI coding agent exactly what to fix, which files to touch, which files to leave alone, and how to verify the fix landed. Surgical fixes run first. Broad changes run last. Ghost finds it. Ghost tells the AI exactly what to do. The AI does it.',
      },
      watch: {
        title: 'Ghost Watcher™',
        body: 'Ghost Watcher™ monitors every commit automatically. When a developer pushes to GitHub, Ghost fires, analyzing the changed files against the full codebase, surfacing findings by severity, and generating a Ghost Brief™ prompt pack. A commit still analyzing shows a pulsing indicator. A completed commit shows its findings. Ghost Watcher™ never blocks a commit, it tells you what changed and what it touches, so nothing ships blind.',
      },
    };

    // ── State ────────────────────────────────────────────────────────
    let manifest = null;
    let currentView = 'level0';  // 'level0' | 'level1' | 'level2'
    let currentMode = null;
    let currentReportId = null;
    let reportBodyCache = {};
    let findingsCache = {};       // report.id → parsed findings JSON
    let level2Tab = 'findings';   // 'findings' | 'report'  (per-render state)
    let findingsFilter = 'all';   // 'all' | 'critical' | 'high' | 'medium' | 'low'
    let multiSelectMode = false;  // when true, Level 1 shows checkboxes
    let multiSelectIds = new Set(); // report ids selected for cross-scan export

    // Ghost Brief state
    let briefData = null;          // ghost-brief-latest.json content (or null if not found)
    let briefHistory = [];         // array of {name, download_url} from briefs/ dir listing
    let briefLoaded = false;       // true once we've attempted fetch
    let briefTab = 'overview';     // 'overview' | 'prompts' | 'regenerate'

    // Ghost Watcher state
    let watchCommits = [];          // unified merged commit entries (newest first)
    let watchLoaded = false;        // true once we've attempted fetch
    let watchTab = 'dashboard';     // 'dashboard' | 'commits' | 'findings' | 'prompts'
    let watchExpanded = new Set();  // short commit hashes expanded in the Commits tab
    let watchPromptRegistry = {};   // copy-key -> prompt text, rebuilt each render
    let watchDateFilter = 'all';    // 'today' | '7d' | '30d' | '90d' | 'all'
    let watchCommitFilter = 'all'; // 'all' or a specific commitShort value

    // ── Boot ─────────────────────────────────────────────────────────
    async function boot() {
      try {
        const res = await fetch(`${API_BASE}/portal-data?c=${PORTAL_SLUG}`);
        if (!res.ok) throw new Error(`portal-data ${res.status}`);
        manifest = await res.json();
        render();
      } catch (err) {
        document.getElementById('app-root').innerHTML =
          `<div class="error">Failed to load portal: ${err.message}</div>`;
      }
    }

    // ── Router (browser back button support) ─────────────────────────
    function navigate(view, mode, reportId) {
      currentView = view;
      currentMode = mode || null;
      currentReportId = reportId || null;
      if (view === 'level0') {
        history.pushState({ view }, '', location.pathname + location.search);
      } else if (view === 'brief') {
        history.pushState({ view }, '', '#brief');
      } else if (view === 'watch') {
        history.pushState({ view }, '', '#watch');
      } else {
        const hash = view === 'level1' ? `#m=${mode}` : `#m=${mode}&r=${reportId}`;
        history.pushState({ view, mode, reportId }, '', hash);
      }
      render();
    }
    window.addEventListener('popstate', (e) => {
      if (e.state) {
        currentView = e.state.view;
        currentMode = e.state.mode;
        currentReportId = e.state.reportId;
      } else {
        currentView = 'level0';
        currentMode = null;
        currentReportId = null;
      }
      render();
    });
    function parseInitialHash() {
      const h = location.hash.replace(/^#/, '');
      if (!h) return;
      if (h === 'brief') { currentView = 'brief'; return; }
      if (h === 'watch') { currentView = 'watch'; return; }
      const params = new URLSearchParams(h);
      const mode = params.get('m');
      const reportId = params.get('r');
      if (mode && reportId) { currentView = 'level2'; currentMode = mode; currentReportId = reportId; }
      else if (mode) { currentView = 'level1'; currentMode = mode; }
    }

    // ── Render dispatch ──────────────────────────────────────────────
    function render() {
      if (currentView === 'level0') renderLevel0();
      else if (currentView === 'level1') renderLevel1();
      else if (currentView === 'level2') renderLevel2();
      else if (currentView === 'brief') renderBriefPanel();
      else if (currentView === 'watch') renderWatchPanel();
    }

    // ── LEVEL 0: Mode tile grid ──────────────────────────────────────
    function renderLevel0() {
      const total = manifest.totalReports;
      const modes = Object.entries(manifest.modeSummary)
        .sort((a, b) => a[1].order - b[1].order);

      const lastGenerated = modes
        .map(([_, v]) => v.lastGenerated)
        .filter(Boolean)
        .sort()
        .reverse()[0];

      const tilesHtml = modes.map(([modeKey, m]) => {
        const isEmpty = m.count === 0;
        const lastSeen = m.lastGenerated ? relativeTime(m.lastGenerated) : '—';
        const hasDescription = !!MODE_DESCRIPTIONS[modeKey];
        return `
          <div class="tile ${isEmpty ? 'empty' : ''}" ${!isEmpty ? `onclick="if(!event.target.closest('.info-icon'))navigate('level1','${modeKey}')"` : ''}>
            ${hasDescription ? `<button class="info-icon" onclick="event.stopPropagation();showModeModal('${modeKey}')" aria-label="What is ${m.label}" title="What is ${m.label}?">i</button>` : ''}
            ${!isEmpty ? '<div class="tile-arrow">↗</div>' : ''}
            <div class="tile-mode" style="margin-left: 28px;">${m.label}</div>
            <div><span class="tile-count">${m.count}</span><span class="tile-count-unit">report${m.count !== 1 ? 's' : ''}</span></div>
            <div class="tile-meta">${isEmpty ? 'No scans yet' : 'Last run ' + lastSeen}</div>
          </div>
        `;
      }).join('');

      document.getElementById('app-root').innerHTML = `
        <div class="hero">
          <div>
            <div class="hero-label">Total Reports</div>
            <div class="hero-value">${total}</div>
            <div class="hero-sub">across ${modes.filter(([_, m]) => m.count > 0).length} active modes</div>
          </div>
          <div class="hero-right">
            <div class="delta">Last scan ${lastGenerated ? relativeTime(lastGenerated) : '—'}</div>
            <div class="delta-sub">Updated ${formatDate(manifest.generatedAt)}</div>
          </div>
        </div>
        <div class="section-label">Scan Modes</div>
        <div class="tile-grid">${tilesHtml}</div>
        <div class="section-label" style="margin-top: 22px;">Outputs</div>
        <div class="tile-grid">
          <div id="brief-tile-container" style="display:contents;">
            <div class="loading" style="font-size:12px;padding:10px 0;">Loading Ghost Brief™…</div>
          </div>
          <div id="watch-tile-container" style="display:contents;">
            <div class="loading" style="font-size:12px;padding:10px 0;">Loading Ghost Watcher™…</div>
          </div>
        </div>
      `;
      loadBriefTile();
      loadWatchTile();
    }

    // ── GHOST BRIEF — tile loader & panel ────────────────────────────

    async function fetchBriefData() {
      if (briefLoaded) return;
      briefLoaded = true;
      try {
        // Fetch latest brief JSON
        const url = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent('briefs/ghost-brief-latest.json')}`;
        const res = await fetch(url);
        if (res.ok) {
          briefData = await res.json();
        }
      } catch (_) { briefData = null; }

      try {
        // Fetch briefs/ directory listing via the same worker
        const dirUrl = `${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent('briefs/')}`;
        const dirRes = await fetch(dirUrl);
        if (dirRes.ok) {
          const listing = await dirRes.json();
          if (Array.isArray(listing)) {
            briefHistory = listing
              .filter(f => f.name && f.name.endsWith('.json') && f.name !== 'ghost-brief-latest.json')
              .sort((a, b) => b.name.localeCompare(a.name));
          }
        }
      } catch (_) { briefHistory = []; }
    }

    async function loadBriefTile() {
      await fetchBriefData();
      const container = document.getElementById('brief-tile-container');
      if (!container) return;

      if (!briefData) {
        container.innerHTML = `
          <div class="tile tile-brief" onclick="if(!event.target.closest('.info-icon'))navigate('brief')" style="cursor:pointer;">
            <button class="info-icon" onclick="event.stopPropagation();showModeModal('ghost-brief')" aria-label="About Ghost Brief™">i</button>
            <div class="tile-arrow">↗</div>
            <div class="tile-mode" style="margin-left: 28px;">Ghost Brief™</div>
            <div class="brief-no-data" style="padding: 10px 0; border: none; text-align: left; font-size: 12px; margin-top: 6px; background: none;">
              No Brief generated yet
            </div>
            <div class="tile-meta">Run: ghost --brief</div>
          </div>
        `;
        return;
      }

      const s = briefData.summary || {};
      const genAt = briefData.generated_at ? formatDate(briefData.generated_at) : '—';
      container.innerHTML = `
        <div class="tile tile-brief" onclick="if(!event.target.closest('.info-icon'))navigate('brief')" style="cursor:pointer;">
          <button class="info-icon" onclick="event.stopPropagation();showModeModal('ghost-brief')" aria-label="About Ghost Brief™">i</button>
          <div class="tile-arrow">↗</div>
          <div class="tile-mode" style="margin-left: 28px;">Ghost Brief™</div>
          <div>
            <span class="tile-count">${s.total_prompts || 0}</span>
            <span class="tile-count-unit">prompt${(s.total_prompts || 0) !== 1 ? 's' : ''}</span>
          </div>
          <div class="tile-meta" style="margin-top: 6px;">${s.estimated_agent_hours != null ? s.estimated_agent_hours + 'h estimated · ' : ''}Generated ${genAt}</div>
        </div>
      `;
    }

    // ── GHOST WATCHER — data fetch, tile loader & panel ──────────────
    //
    // Unified Watch tab. Two data layers are merged by short commit hash:
    //   • per-commit STATE files (scans/watch/commits/<hash>.json) — the only
    //     source carrying pending/complete status, so they drive the
    //     "Analyzing" pulse and the commit list including in-flight commits.
    //   • per-developer SCAN files (scans/watch/<dev>/watch-*.json) — richer
    //     findings plus the Ghost Brief™ prompt pack, powering the Findings
    //     and Prompts tabs.
    async function fetchWatchData() {
      if (watchLoaded) return;
      watchLoaded = true;
      try {
        const projRes = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent('projects/')}`);
        if (!projRes.ok) return;
        const projListing = await projRes.json();
        if (!Array.isArray(projListing)) return;
        const projectDirs = projListing.filter(e => e.type === 'dir').map(e => e.name);

        const byShort = new Map();
        const ensure = (short) => {
          if (!byShort.has(short)) byShort.set(short, { commitShort: short });
          return byShort.get(short);
        };

        await Promise.all(projectDirs.map(async (proj) => {
          // (a) per-commit state files — authoritative for pending/complete.
          try {
            const stateDir = `projects/${proj}/scans/watch/commits/`;
            const r = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(stateDir)}`);
            if (r.ok) {
              const listing = await r.json();
              if (Array.isArray(listing)) {
                await Promise.all(listing
                  .filter(f => f.type === 'file' && f.name && f.name.endsWith('.json'))
                  .map(async (f) => {
                    try {
                      const sres = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(f.path)}`);
                      if (!sres.ok) return;
                      const s = await sres.json();
                      const short = (s.commitHash || '').slice(0, 7);
                      if (!short) return;
                      const e = ensure(short);
                      e.project           = proj;
                      e.commitHash        = s.commitHash || e.commitHash;
                      e.branch            = s.branch || e.branch;
                      e.developer         = e.developer || s.developer || null;
                      e.timestamp         = e.timestamp || s.timestamp;
                      e.status            = s.status || e.status || 'complete';
                      e.stateSeverity     = s.severity || e.stateSeverity || null;
                      e.stateFindings     = Array.isArray(s.findings) ? s.findings : e.stateFindings;
                      e.stateFindingCount = typeof s.findingCount === 'number' ? s.findingCount : e.stateFindingCount;
                      e.statePromptCount  = typeof s.prompts === 'number' ? s.prompts : e.statePromptCount;
                      e.stateTokenUsage   = s.tokenUsage || e.stateTokenUsage || null;
                    } catch (_) { /* skip bad state file */ }
                  }));
              }
            }
          } catch (_) { /* no commits dir — skip */ }

          // (b) per-developer scan files — richer findings + brief prompts.
          try {
            const watchDir = `projects/${proj}/scans/watch/`;
            const r = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(watchDir)}`);
            if (r.ok) {
              const devFolders = await r.json();
              if (Array.isArray(devFolders)) {
                await Promise.all(devFolders
                  .filter(d => d.type === 'dir')
                  .map(async (d) => {
                    try {
                      const dr = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(watchDir + d.name + '/')}`);
                      if (!dr.ok) return;
                      const files = await dr.json();
                      if (!Array.isArray(files)) return;
                      await Promise.all(files
                        .filter(f => f.name && f.name.endsWith('.json') && !f.name.startsWith('watch-brief-'))
                        .map(async (f) => {
                          try {
                            const sres = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(f.path)}`);
                            if (!sres.ok) return;
                            const s = await sres.json();
                            const short = s.commitShort || (s.commit || '').slice(0, 7);
                            if (!short) return;
                            const e = ensure(short);
                            e.project          = e.project || proj;
                            e.commitHash       = e.commitHash || s.commit;
                            e.branch           = e.branch || s.branch;
                            if (!e.developer && s.developer) e.developer = s.developer;
                            e.timestamp        = e.timestamp || s.generatedAt;
                            e.scanSeverity     = s.severityCounts || e.scanSeverity || null;
                            e.scanFindings     = Array.isArray(s.findings) ? s.findings : e.scanFindings;
                            e.verifiedFindings = Array.isArray(s.verifiedFindings) ? s.verifiedFindings : e.verifiedFindings;
                            e.scanFindingCount = typeof s.findingCount === 'number' ? s.findingCount : e.scanFindingCount;
                            e.brief            = s.brief || e.brief || null;
                            e.briefPromptCount = typeof s.briefPromptCount === 'number' ? s.briefPromptCount : e.briefPromptCount;
                            e.scanTokenUsage   = s.tokenUsage || e.scanTokenUsage || null;
                            e.narratorFailed   = e.narratorFailed || !!s.narratorFailed;
                          } catch (_) { /* skip bad scan file */ }
                        }));

                      // (b2) standalone watch-brief files carry resume-delivered
                      // detailed prompts (Step 8e). Merge their prompts into any
                      // commit whose brief has no prompts yet. Runs after the scan
                      // files above so we only fill genuine gaps.
                      await Promise.all(files
                        .filter(f => f.name && f.name.startsWith('watch-brief-') && f.name.endsWith('.json'))
                        .map(async (f) => {
                          try {
                            const short = f.name.replace(/^watch-brief-/, '').replace(/\.json$/, '');
                            if (!short) return;
                            const e = ensure(short);
                            if (e.brief && Array.isArray(e.brief.prompts) && e.brief.prompts.length) return;
                            const bres = await fetch(`${API_BASE}/portal-report?c=${PORTAL_SLUG}&r=${encodeURIComponent(f.path)}`);
                            if (!bres.ok) return;
                            const fetched = await bres.json();
                            if (fetched && Array.isArray(fetched.prompts) && fetched.prompts.length) {
                              e.project          = e.project || proj;
                              e.brief            = e.brief ? { ...e.brief, prompts: fetched.prompts } : fetched;
                              e.briefPromptCount = fetched.prompts.length;
                            }
                          } catch (_) { /* skip bad brief file */ }
                        }));
                    } catch (_) { /* skip dev folder */ }
                  }));
              }
            }
          } catch (_) { /* no watch dir — skip */ }
        }));

        // Finalize: scan data is richer, so prefer it for findings/severity;
        // fall back to commit-state. Status comes only from commit-state.
        watchCommits = Array.from(byShort.values()).map(e => {
          const findings = e.scanFindings || e.stateFindings || [];
          const severity = e.scanSeverity || e.stateSeverity || { critical: 0, high: 0, medium: 0, low: 0 };
          const findingCount = e.scanFindingCount != null ? e.scanFindingCount
            : e.stateFindingCount != null ? e.stateFindingCount
            : findings.length;
          const developer = typeof e.developer === 'string'
            ? e.developer
            : (e.developer?.name || e.developer?.email || 'unknown');
          return {
            commitShort:      e.commitShort,
            commitHash:       e.commitHash || e.commitShort,
            branch:           e.branch || '—',
            developer,
            timestamp:        e.timestamp || null,
            status:           e.status || 'complete',
            severity,
            findings,
            verifiedFindings: e.verifiedFindings || [],
            findingCount,
            brief:            e.brief || null,
            briefPromptCount: e.briefPromptCount != null ? e.briefPromptCount
              : e.statePromptCount != null ? e.statePromptCount : 0,
            tokenUsage:       e.scanTokenUsage || e.stateTokenUsage || null,
            narratorFailed:   !!e.narratorFailed,
          };
        }).sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
      } catch (_) {
        watchCommits = [];
      }
    }

    async function loadWatchTile() {
      await fetchWatchData();
      const container = document.getElementById('watch-tile-container');
      if (!container) return;

      const count = watchCommits.length;
      const pendingCount = watchCommits.filter(c => c.status === 'pending').length;
      const latest = watchCommits[0]?.timestamp;
      const metaText = pendingCount > 0
        ? '⏳ Analyzing…'
        : (latest ? 'Last scan ' + relativeTime(latest) : 'No commits scanned yet');

      container.innerHTML = `
        <div class="tile tile-watch" onclick="if(!event.target.closest('.info-icon'))navigate('watch')" style="cursor:pointer;">
          <button class="info-icon" onclick="event.stopPropagation();showModeModal('watch')" aria-label="About Ghost Watcher™">i</button>
          <div class="tile-arrow">↗</div>
          <div class="tile-mode" style="margin-left: 28px;">Ghost Watcher™</div>
          <div>
            <span class="tile-count">${count}</span>
            <span class="tile-count-unit">commit${count !== 1 ? 's' : ''}</span>
          </div>
          <div class="tile-meta" style="margin-top: 6px;">${metaText}</div>
        </div>
      `;
    }

    // ── Ghost Watcher panel render ───────────────────────────────────
    async function renderWatchPanel() {
      document.getElementById('app-root').innerHTML = `
        <div class="back-bar">
          <button class="back-btn" onclick="navigate('level0')">← Back</button>
          <div class="breadcrumb">${PORTAL_SLUG} / <b>Ghost Watcher™</b></div>
        </div>
        <div id="watch-panel-content"><div class="loading">Loading Ghost Watcher™…</div></div>
      `;
      await fetchWatchData();
      renderWatchContent();
    }

    function renderWatchContent() {
      const container = document.getElementById('watch-panel-content');
      if (!container) return;

      if (!watchCommits.length) {
        container.innerHTML = `
          <div class="watch-empty">
            <div class="ghost-icon">👻</div>
            <div class="watch-empty-msg">No commits scanned yet. Ghost Watcher™ will appear here after your first CI run.</div>
          </div>`;
        return;
      }

      // Date-range filter scopes the tab badges and lists. Stats panel stays
      // a global summary of all scanned commits.
      const filtered = getFilteredWatchCommits();

      const pendingCount = watchCommits.filter(c => c.status === 'pending').length;
      const promptTotal = filtered.reduce((n, r) => n + (r.brief?.prompts?.length || r.briefPromptCount || 0), 0);
      const findingTotal = filtered.reduce((n, r) => n + ((r.findings || []).length), 0);
      const latest = watchCommits[0]?.timestamp;

      const statsHtml = `
        <div class="mode-stats">
          <div class="mode-stat"><div class="label">Commits Scanned</div><div class="value">${watchCommits.length}</div></div>
          <div class="mode-stat"><div class="label">Analyzing</div><div class="value">${pendingCount}</div></div>
          <div class="mode-stat"><div class="label">Latest Scan</div><div class="value" style="font-size:14px;">${latest ? relativeTime(latest) : '—'}</div></div>
        </div>`;

      const pills = [
        { v: 'today', label: 'Today' }, { v: '7d', label: '7D' }, { v: '30d', label: '30D' },
        { v: '90d', label: '90D' }, { v: 'all', label: 'All' },
      ].map(p => `<button class="watch-date-pill ${watchDateFilter === p.v ? 'active' : ''}" onclick="setWatchDateFilter('${p.v}')">${p.label}</button>`).join('');

      container.innerHTML = statsHtml + `
        <div class="view-tabs brief-tabs">
          <button class="view-tab ${watchTab === 'dashboard' ? 'active' : ''}" onclick="switchWatchTab('dashboard')">
            Dashboard
          </button>
          <button class="view-tab ${watchTab === 'commits' ? 'active' : ''}" onclick="switchWatchTab('commits')">
            Commits<span class="view-tab-count">${filtered.length}</span>
          </button>
          <button class="view-tab ${watchTab === 'findings' ? 'active' : ''}" onclick="switchWatchTab('findings')">
            Findings${findingTotal > 0 ? `<span class="view-tab-count">${findingTotal}</span>` : ''}
          </button>
          <button class="view-tab ${watchTab === 'prompts' ? 'active' : ''}" onclick="switchWatchTab('prompts')">
            Prompts${promptTotal > 0 ? `<span class="view-tab-count">${promptTotal}</span>` : ''}
          </button>
        </div>
        <div class="watch-date-filter">${pills}</div>
        <div id="watch-tab-content"></div>
      `;
      renderWatchTab();
    }

    function switchWatchTab(tab) {
      watchTab = tab;
      renderWatchContent();
    }

    function watchWindowStart(filter) {
      if (filter === 'all') return null;
      if (filter === 'today') { const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime(); }
      const days = filter === '7d' ? 7 : filter === '30d' ? 30 : filter === '90d' ? 90 : 0;
      return Date.now() - days * 86400000;
    }
    function getFilteredWatchCommits() {
      const start = watchWindowStart(watchDateFilter);
      if (start == null) return watchCommits;          // 'all' -> full set
      return watchCommits.filter(c => {
        if (!c.timestamp) return false;                // undated commits show only under All
        const t = new Date(c.timestamp).getTime();
        return Number.isFinite(t) && t >= start;
      });
    }
    function setWatchDateFilter(filter) {
      watchDateFilter = filter;
      watchCommitFilter = 'all'; // reset commit filter when date range changes
      renderWatchContent();
    }

    function setWatchCommitFilter(short) {
      watchCommitFilter = short;
      renderWatchTab();
    }

    function renderWatchTab() {
      const container = document.getElementById('watch-tab-content');
      if (!container) return;
      watchPromptRegistry = {};

      const commits = getFilteredWatchCommits();

      if (watchTab === 'dashboard') {
        container.innerHTML = renderWatchDashboard(commits);
        return;
      }

      if (watchTab === 'commits') {
        if (!commits.length) {
