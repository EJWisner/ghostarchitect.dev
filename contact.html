<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &amp; Support — Ghost Architect™</title>
  <meta name="description" content="Contact Ghost Architect™ support — questions, issues, and help for the CLI codebase triage tool and companion mobile app." />
  <link rel="canonical" href="https://ghostarchitect.dev/contact" />
  <link rel="icon" type="image/jpeg" href="/GHOSTLOGO.JPG" />
  <link rel="apple-touch-icon" href="/GHOSTLOGO.JPG" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #2a2a3a;
      --accent: #4a9eff;
      --text: #e8e8f0;
      --text-muted: #888899;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); line-height: 1.8; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; height: 56px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 1rem; }
    .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }
    .content { max-width: 760px; margin: 0 auto; padding: 4rem 2rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--text); }
    .tagline { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 3rem; font-family: var(--font-mono); }
    h2 { font-size: 1.2rem; color: var(--accent); margin: 2.5rem 0 1rem; font-family: var(--font-mono); }
    p { margin-bottom: 1rem; color: var(--text); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: var(--font-mono); background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; border: 1px solid var(--border); }

    /* form */
    .contact-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin: 2rem 0;
    }
    .field { margin-bottom: 1.5rem; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    label .req { color: var(--accent); }
    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      padding: 0.7rem 0.85rem;
      line-height: 1.5;
    }
    select { font-family: var(--font-mono); cursor: pointer; }
    textarea { resize: vertical; min-height: 8rem; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(74,158,255,0.18);
    }
    /* honeypot — visually removed without display:none */
    .hp-field {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    button.submit {
      background: var(--accent);
      color: #04101f;
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.8rem 1.6rem;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button.submit:hover { opacity: 0.88; }
    button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-msg {
      display: none;
      margin-top: 1.25rem;
      padding: 0.9rem 1.1rem;
      border-radius: 6px;
      font-size: 0.92rem;
      line-height: 1.6;
    }
    .form-msg.success {
      display: block;
      background: rgba(74,158,255,0.08);
      border: 1px solid var(--accent);
      color: var(--text);
    }
    .form-msg.error {
      display: block;
      background: rgba(255,90,90,0.08);
      border: 1px solid #c4504f;
      color: var(--text);
    }
    footer { border-top: 1px solid var(--border); padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 4rem; }
  </style>
  <link rel="stylesheet" href="/assets/ga-nav.css" />
</head>
<body>


<div id="ga-nav-mount"></div>


<div class="content">
  <h1>Contact &amp; Support</h1>
  <p class="tagline">Have a question or issue? We're here to help.</p>

  <div class="contact-form">
    <div class="field">
      <label for="cf-name">Name <span class="req">*</span></label>
      <input type="text" id="cf-name" name="name" required autocomplete="name" />
    </div>

    <div class="field">
      <label for="cf-email">Email <span class="req">*</span></label>
      <input type="email" id="cf-email" name="email" required autocomplete="email" />
    </div>

    <div class="field">
      <label for="cf-type">Type of inquiry <span class="req">*</span></label>
      <select id="cf-type" name="type" required>
        <option value="" disabled selected>Select a type</option>
        <option value="Pre-sales Question">Pre-sales Question</option>
        <option value="Technical Support">Technical Support</option>
        <option value="Billing">Billing</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field">
      <label for="cf-subject">Subject <span class="req">*</span></label>
      <input type="text" id="cf-subject" name="subject" required />
    </div>

    <div class="field" id="cf-version-field" style="display:none;">
      <label for="cf-version">Version <span class="req">*</span></label>
      <select id="cf-version" name="version">
        <option value="" disabled selected>Select a version</option>
        <option value="9.3.5">9.3.5</option>
        <option value="9.3.4">9.3.4</option>
        <option value="9.3.3">9.3.3</option>
        <option value="9.3.2">9.3.2</option>
        <option value="9.3.1">9.3.1</option>
        <option value="9.3.0">9.3.0</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field" id="cf-tier-field" style="display:none;">
      <label for="cf-tier">Tier <span class="req">*</span></label>
      <select id="cf-tier" name="tier">
        <option value="" disabled selected>Select a tier</option>
        <option value="Open">Open</option>
        <option value="Pro">Pro</option>
        <option value="Pro Max">Pro Max</option>
        <option value="Team">Team</option>
        <option value="Team Max">Team Max</option>
        <option value="Enterprise">Enterprise</option>
        <option value="Enterprise Max">Enterprise Max</option>
      </select>
    </div>

    <div class="field">
      <label for="cf-message">Message <span class="req">*</span></label>
      <textarea id="cf-message" name="message" rows="6" required></textarea>
    </div>

    <!-- honeypot: hidden from humans, bots will fill it -->
    <div class="hp-field" aria-hidden="true">
      <label for="cf-website">Website</label>
      <input type="text" id="cf-website" name="website" tabindex="-1" autocomplete="off" />
    </div>

    <div class="field">
      <button type="button" class="submit" id="cf-submit">Send message</button>
    </div>

    <div class="form-msg" id="cf-msg" role="status" aria-live="polite"></div>
  </div>

  <p style="color: var(--text-muted); font-size: 0.9rem;">
    Prefer email? Reach us directly at
    <a href="mailto:support@ghostarchitect.dev">support@ghostarchitect.dev</a>.
  </p>
</div>

<footer>
  © 2026 Ghost Architect™. All rights reserved. · <a href="/">Home</a> · <a href="/privacy">Privacy</a> · <a href="/pricing">Pricing</a>
</footer>

<script src="/assets/ga-nav.js" defer></script>
<script>
  (function () {
    var btn = document.getElementById('cf-submit');
    var msg = document.getElementById('cf-msg');
    var typeEl = document.getElementById('cf-type');
    var versionField = document.getElementById('cf-version-field');
    var tierField = document.getElementById('cf-tier-field');
    var versionEl = document.getElementById('cf-version');
    var tierEl = document.getElementById('cf-tier');
    var SUCCESS = "Your message was sent. We typically respond within 1 business day.";
    var ERROR = "Something went wrong. Please email support@ghostarchitect.dev directly.";

    // Version + Tier are only relevant for Technical Support requests.
    // Show and require them only for that type; hide and un-require otherwise.
    function syncConditionalFields() {
      var isTech = typeEl.value === 'Technical Support';
      versionField.style.display = isTech ? '' : 'none';
      tierField.style.display = isTech ? '' : 'none';
      if (isTech) {
        versionEl.setAttribute('required', '');
        tierEl.setAttribute('required', '');
      } else {
        versionEl.removeAttribute('required');
        tierEl.removeAttribute('required');
      }
    }

    typeEl.addEventListener('change', syncConditionalFields);
    syncConditionalFields();

    function showMsg(kind, text) {
      msg.className = 'form-msg ' + kind;
      msg.textContent = text;
    }

    function clearMsg() {
      msg.className = 'form-msg';
      msg.textContent = '';
    }

    btn.addEventListener('click', function () {
      clearMsg();

      var name = document.getElementById('cf-name');
      var email = document.getElementById('cf-email');
      var type = typeEl;
      var subject = document.getElementById('cf-subject');
      var version = versionEl;
      var tier = tierEl;
      var message = document.getElementById('cf-message');
      var honeypot = document.getElementById('cf-website');

      var techVisible = type.value === 'Technical Support';

      // Always-required fields, plus Version + Tier only when visible.
      var fields = [name, email, type, subject];
      if (techVisible) { fields.push(version, tier); }
      fields.push(message);
      for (var i = 0; i < fields.length; i++) {
        if (!fields[i].value || !fields[i].checkValidity()) {
          fields[i].focus();
          fields[i].reportValidity();
          return;
        }
      }

      var payload = {
        name: name.value.trim(),
        email: email.value.trim(),
        type: type.value,
        subject: subject.value.trim(),
        version: techVisible ? version.value : 'N/A',
        tier: techVisible ? tier.value : 'N/A',
        message: message.value.trim(),
        honeypot: honeypot.value
      };

      btn.disabled = true;
      var originalLabel = btn.textContent;
      btn.textContent = 'Sending...';

      fetch('https://signup.ghostarchitect.dev/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (res) {
          if (!res.ok) { throw new Error('Request failed: ' + res.status); }
          return res;
        })
        .then(function () {
          showMsg('success', SUCCESS);
          name.value = '';
          email.value = '';
          type.selectedIndex = 0;
          subject.value = '';
          version.selectedIndex = 0;
          tier.selectedIndex = 0;
          message.value = '';
          honeypot.value = '';
          syncConditionalFields();
          btn.textContent = originalLabel;
          // leave button disabled after a successful send
        })
        .catch(function () {
          showMsg('error', ERROR);
          btn.disabled = false;
          btn.textContent = originalLabel;
        });
    });
  })();
</script>
</body>
</html>
